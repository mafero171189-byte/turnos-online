                                        <label className="block text-xs font-semibold text-neutral-500 uppercase mb-2">Límite de turnos por día (0 = sin límite)</label>
                                        <input name="maxPerDay" type="number" min="0" max="100" defaultValue={profile.config?.maxPerDay||0} className="w-32 p-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm outline-none" />
                                    </div>
                                    <div className="mt-6">
                                        <label className="flex items-start gap-3 cursor-pointer bg-neutral-50 border border-neutral-200 p-4 rounded-xl transition hover:bg-neutral-100">
                                            <input name="notificationsEnabled" type="checkbox" defaultChecked={profile.config?.notificationsEnabled !== false} className="w-5 h-5 mt-0.5 accent-brand-600 cursor-pointer"
                                                onChange={async (e) => {
                                                    if (!e.target.checked) return;
                                                    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                                                    if (isIOS) {
                                                        // Safari/iOS bloquea permisos si no nacen de un gesto: solo guardamos la preferencia
                                                        return;
                                                    }
                                                    // Android / desktop: pedimos permiso nativo en respuesta al clic real del usuario
                                                    const granted = await requestNotificationPermission().catch(() => false);
                                                    if (!granted) {
                                                        e.target.checked = false;
                                                    }
                                                }}
                                            />
                                            <div>
                                                <span className="block text-sm font-semibold text-neutral-800">Recibir notificaciones</span>
                                                <span className="block text-xs text-neutral-500 mt-1">Te avisaremos con sonido y alerta en tu dispositivo cuando un cliente reserve o cancele un turno.</span>
                                            </div>
                                        </label>
                                    </div>
                                </div>
                                <button type="submit" disabled={saving} className={`px-8 py-4 rounded-2xl font-semibold shadow-lg text-white transition ${saving ? 'bg-brand-400 cursor-not-allowed' : 'bg-brand-600 active:scale-95'}`}>{saving ? 'Guardando...' : 'Guardar Cambios'}</button>
                            </form>
                        </div>

                        {/* Días bloqueados */}
                        <BlockedDatesPanel profId={user.uid} profile={profile} setToast={setToast} />
                    </div>
                )}
            </div>
        );
    }
    // ===================== CLIENT =====================
    function ClientView({ profId, setDialog, setToast }) {
        const [prof, setProf]               = useState(null);
        const [sent, setSent]               = useState(null);
        const [selectedDate, setSelectedDate] = useState('');
        const [selectedTime, setSelectedTime] = useState('');
        const [bookedTimes, setBookedTimes] = useState([]);
        const [booking, setBooking]         = useState(false);
        const [clientView, setClientView]   = useState('book');
        const [phoneLocal, setPhoneLocal]   = useState('');
        const [phonePrefix, setPhonePrefix] = useState('54');
        const [profExpired, setProfExpired] = useState(false);
        const [loadingSlots, setLoadingSlots] = useState(false);
        const [holdSecondsLeft, setHoldSecondsLeft] = useState(null);
        const [selectingSlot, setSelectingSlot] = useState(false);
        const [showWaitlistForm, setShowWaitlistForm] = useState(false);
        const [waitlistPhonePrefix, setWaitlistPhonePrefix] = useState('54');
        const [waitlistPhoneLocal, setWaitlistPhoneLocal] = useState('');

        const sessionId = useRef(
            sessionStorage.getItem('_tfpSid') || (() => {
                const id = Math.random().toString(36).slice(2) + Date.now().toString(36);
                sessionStorage.setItem('_tfpSid', id); return id;
            })()
        );
        const holdTimerRef      = useRef(null);
        const currentHoldRef   = useRef(null); 
        const remainingSecsRef = useRef(120);  

        const releaseHold = async (slotId) => {
            try { await db.collection("holds").doc(slotId).delete(); } catch(e) {}
        };

        const clearHoldState = () => {
            clearInterval(holdTimerRef.current);
            holdTimerRef.current = null;
            setHoldSecondsLeft(null);
        };

        const abandonHold = async (resetTimer = false) => {
            clearHoldState();
            if (resetTimer) remainingSecsRef.current = 120;
            if (currentHoldRef.current) {
                const slotToRelease = currentHoldRef.current;
                currentHoldRef.current = null; 
                await releaseHold(slotToRelease);
            }
        };

        const selectedDateRef = useRef('');
        useEffect(() => { selectedDateRef.current = selectedDate; }, [selectedDate]);

        useEffect(() => {
            if (holdSecondsLeft !== null && holdSecondsLeft > 0) remainingSecsRef.current = holdSecondsLeft;
        }, [holdSecondsLeft]);

        const expiryMountedRef = useRef(true);
        useEffect(() => { expiryMountedRef.current = true; return () => { expiryMountedRef.current = false; }; }, []);

        useEffect(() => {
            if (holdSecondsLeft !== 0) return;
            clearInterval(holdTimerRef.current);
            holdTimerRef.current = null;
            const expiredSlot = currentHoldRef.current;
            currentHoldRef.current = null;
            setHoldSecondsLeft(null);
            setSelectedTime('');
            if (expiredSlot) releaseHold(expiredSlot);
            const dateToReload = selectedDateRef.current;
            if (dateToReload) {
                setSelectedDate('');
                setTimeout(() => { if (expiryMountedRef.current) setSelectedDate(dateToReload); }, 0);
            }
            remainingSecsRef.current = 120; 
            setToast({ type:'error', message:'⏱ Tiempo agotado. El horario volvió a estar disponible.' });
        }, [holdSecondsLeft]);

        useEffect(() => {
            return () => {
                clearInterval(holdTimerRef.current);
                if (currentHoldRef.current) releaseHold(currentHoldRef.current);
            };
        }, []);

        useEffect(() => {
            const prevTitle = document.title;
            const handleSnap = (d) => {
                if (d.exists) {
                    const data = d.data();
                    const daysLeft = getDaysLeft(data.licenseExpiresAt);
                    if (daysLeft <= 0 || data.isSuspended) { setProfExpired(true); return; }
                    if (!data.config) data.config = { workingDays:[1,2,3,4,5], startTime:'09:00', endTime:'18:00', duration:30, maxPerDay:0, blockedDates:[] };
                    setProf(data);
                    if (data.themeColor) document.documentElement.style.setProperty('--custom-color', data.themeColor);
                    document.title = `Reservas - ${data.business}`;
                } else {
                    setProfExpired(true);
                }
            };
            const unsub = db.collection("professionals").doc(profId).onSnapshot(handleSnap, () => setProfExpired(true));
            // Forzar re-fetch desde el servidor cuando el usuario vuelve a la página
            // (el onSnapshot puede quedar desconectado en mobile al ir a segundo plano)
            const handleVisibility = () => {
                if (document.visibilityState === 'visible') {
                    db.collection("professionals").doc(profId).get({ source: 'server' })
                        .then(handleSnap)
                        .catch(() => {});
                }
            };
            document.addEventListener('visibilitychange', handleVisibility);
            return () => { unsub(); document.title = prevTitle; document.removeEventListener('visibilitychange', handleVisibility); };
        }, [profId]);

        useEffect(() => {
            if (selectedDate && profId) {
                let active = true;
                abandonHold();
                setSelectedTime('');
                setBookedTimes([]);
                setShowWaitlistForm(false);
                setLoadingSlots(true);
                const nowMs = Date.now();
                Promise.all([
                    db.collection("appointments").where("profId","==",profId).where("date","==",selectedDate).get(),
                    db.collection("holds").where("profId","==",profId).where("date","==",selectedDate).get()
                ]).then(([aptsSnap, holdsSnap]) => {
                    if (!active) return;
                    const fromApts = aptsSnap.docs.map(d => d.data()).filter(d => !d.cancelled).map(d => d.time);
                    const fromHolds = holdsSnap.docs.map(d => d.data()).filter(d => {
                        const exp = d.expiresAt?.toDate ? d.expiresAt.toDate().getTime() : new Date(d.expiresAt).getTime();
                        return exp > nowMs && d.sessionId !== sessionId.current;
                    }).map(d => d.time);
                    setBookedTimes([...new Set([...fromApts, ...fromHolds])]);
                    setLoadingSlots(false);
                }).catch(() => {
                    if (!active) return;
                    setBookedTimes([]); setLoadingSlots(false);
                    setToast({ type:'error', message:'No se pudieron cargar los horarios. Recargá la página.' });
                });
                return () => { active = false; };
            }
        }, [selectedDate, profId]);

        const selectTime = async (time) => {
            if (selectingSlot || time === selectedTime) return; // GUARD: evita doble clic y re-selección
            setSelectingSlot(true);
            if (currentHoldRef.current) {
                await releaseHold(currentHoldRef.current);
                currentHoldRef.current = null;
                clearHoldState();
            }
            const slotId = `${profId}_${selectedDate}_${time.replace(':','-')}`;
            const secsToUse = Math.max(remainingSecsRef.current || 120, 30);
            const expiresAt = firebase.firestore.Timestamp.fromMillis(Date.now() + secsToUse * 1000);
            try {
                if (!auth.currentUser) await auth.signInAnonymously().catch(() => {});
                await db.runTransaction(async (tx) => {
                    const holdRef  = db.collection("holds").doc(slotId);
                    const aptRef   = db.collection("appointments").doc(slotId);
                    const [holdDoc, aptDoc] = await Promise.all([tx.get(holdRef), tx.get(aptRef)]);
                    if (aptDoc.exists && !aptDoc.data().cancelled) throw new Error("Este turno acaba de ser reservado por otra persona.");
                    if (holdDoc.exists) {
                        const h = holdDoc.data();
                        const exp = h.expiresAt?.toDate ? h.expiresAt.toDate().getTime() : new Date(h.expiresAt).getTime();
                        if (exp > Date.now() && h.sessionId !== sessionId.current) throw new Error("Otro usuario está reservando este turno. Intentá en unos instantes.");
                        // Hold expirado: borrarlo de la DB (limpieza de "basura fantasma")
                        if (exp <= Date.now()) tx.delete(holdRef);
                    }
                    tx.set(holdRef, { 
                        profId, date: selectedDate, time, sessionId: sessionId.current, expiresAt,
                        serverCreatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        creatorUid: auth.currentUser?.uid
                    });
                });
                currentHoldRef.current = slotId;
                setSelectedTime(time);
                clearInterval(holdTimerRef.current);
                setHoldSecondsLeft(secsToUse);
                holdTimerRef.current = setInterval(() => {
                    setHoldSecondsLeft(prev => {
                        if (prev === null) return null;
                        if (prev <= 1) return 0; 
                        return prev - 1;
                    });
                }, 1000);
            } catch(err) {
                setSelectedTime('');
                setToast({ type:'error', message: err.message || 'No se pudo reservar el horario.' });
            } finally { 
                if (expiryMountedRef.current) setSelectingSlot(false); 
            }
        };

          const handleWaitlist = async (e) => {
            e.preventDefault();
            
            // Obtenemos el nombre usando el ID del input para evitar el error del e.target
            const clientInput = document.getElementById('waitlistClient');
            const clientName = clientInput ? clientInput.value.trim() : '';
            
            if (!clientName) { 
                setToast({ type:'error', message:'Ingresá tu nombre y apellido.' }); 
                return; 
            }

            const wLocal = waitlistPhoneLocal.replace(/\D/g,'');
            if (wLocal.length < 8) { 
                setToast({ type:'error', message:'Ingresá un WhatsApp válido.' }); 
                return; 
            }
            
            const builtPhone = buildPhone(waitlistPhonePrefix, wLocal);
            setBooking(true);
            
            try {
                if (!auth.currentUser) await auth.signInAnonymously();
                
                // Verificar duplicado: misma fecha, mismo teléfono, mismo profesional
                const dupSnap = await db.collection("waitlists")
                    .where("profId", "==", profId)
                    .where("date", "==", selectedDate)
                    .where("phone", "==", builtPhone)
                    .limit(1).get();
                    
                if (!dupSnap.empty) {
                    setToast({ type:'error', message:'Ya estás en la lista de espera para ese día.' });
                    setBooking(false); 
                    return;
                }
                
                await db.collection("waitlists").add({
                    profId,
                    date: selectedDate,
                    client: clientName,
                    phone: builtPhone,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                setToast({type:'success', message:'¡Anotado! Te avisaremos si se libera un turno.'});
                setShowWaitlistForm(false);
            } catch(err) {
                setToast({type:'error', message:'No se pudo anotar en la lista.'});
            } finally { 
                setBooking(false); 
            }
        };

        const handleBooking = async (e) => {
            e.preventDefault(); if (!selectedTime) return;
            if (selectedDate === getTodayStr()) {
                const nowMins = new Date().getHours()*60 + new Date().getMinutes();
                const [sh, sm] = selectedTime.split(':').map(Number);
                if (sh*60+sm <= nowMins) { setToast({ type:'error', message:'Ese horario ya pasó. Por favor elegí otro.' }); await abandonHold(); setSelectedTime(''); return; }
            }
            if (holdSecondsLeft === null || holdSecondsLeft <= 0) { setToast({ type:'error', message:'Tu reserva expiró. Elegí un nuevo horario.' }); return; }
            if (phoneLocal.replace(/\D/g,'').length < 8) { setToast({ type:'error', message:'Ingresá un número de WhatsApp válido.' }); return; }
            const dniValue = (e.target.dni?.value || '').replace(/\D/g,'');
            if (dniValue.length < 6) { setToast({ type:'error', message:'Ingresá un DNI válido.' }); return; }
            
            setBooking(true);
            
            try { 
                let currentUid = auth.currentUser?.uid;
                if (!currentUid) {
                    const cred = await auth.signInAnonymously();
                    currentUid = cred.user.uid;
                }
                const slotId  = `${profId}_${selectedDate}_${selectedTime.replace(':','-')}`;
                const holdRef = db.collection("holds").doc(slotId);
                const slotRef = db.collection("appointments").doc(slotId);
                
                const maxPerDay = prof?.config?.maxPerDay || 0;
                if (maxPerDay > 0) {
                    const daySnap = await db.collection("appointments").where("profId", "==", profId).where("date", "==", selectedDate).get();
                    const activeCount = daySnap.docs.filter(d => !d.data().cancelled).length;
                    if (activeCount >= maxPerDay) { setToast({ type:'error', message:'Ya se alcanzó el máximo de turnos para ese día.' }); setBooking(false); return; }
                }

                const holdDoc = await holdRef.get();
                if (!holdDoc.exists) throw new Error("Tu reserva ya no está activa. Elegí el horario nuevamente.");
                if (holdDoc.data().sessionId !== sessionId.current) throw new Error("Tu reserva fue tomada por otra persona. Elegí otro horario.");
                const holdExp = holdDoc.data().expiresAt?.toDate ? holdDoc.data().expiresAt.toDate().getTime() : new Date(holdDoc.data().expiresAt).getTime();
                if (holdExp <= Date.now()) throw new Error("Tu reserva expiró. Elegí el horario nuevamente.");

                const clientName = e.target.clientName.value.trim();
                const fullPhone = buildPhone(phonePrefix, phoneLocal);
                const notes = e.target.notes?.value || '';

                // --- LÓGICA INTELIGENTE DE COBRO ---
                const isMp = (!prof.paymentMethod || prof.paymentMethod === 'mercadopago');

                if (isMp) {
                    const montoNumerico = (prof.price || '1000').replace(/[^0-9]/g, '');
                    if (!montoNumerico || montoNumerico === '0') {
                        throw new Error("El negocio no configuró un precio válido para cobrar con Mercado Pago.");
                    }

                    const res = await fetch('https://turnofacil-backend-4r9k.onrender.com/crear-preferencia', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            profId,
                            monto: montoNumerico,
                            concepto: `Reserva en ${prof.business}`,
                            clientData: { clientName, phone: fullPhone, dni: dniValue, date: selectedDate, time: selectedTime }
                        })
                    });
                    const data = await res.json();
                    if (data.init_point) {
                        window.location.href = data.init_point; 
                        return; 
                    } else {
                        throw new Error("No se pudo conectar con Mercado Pago.");
                    }
                } else {
                    // OPCIÓN TRANSFERENCIA
                    const aptData = {
                        profId, date: selectedDate, time: selectedTime,
                        client: clientName, dni: dniValue, phone: fullPhone, notes: notes,
                        clientUid: currentUid, status: 'pendiente_pago', method: 'transferencia',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    await db.runTransaction(async (tx) => {
                        const slotDocTx = await tx.get(slotRef);
                        if (slotDocTx.exists && !slotDocTx.data().cancelled) throw new Error("Ese horario ya fue reservado.");
                        tx.set(slotRef, aptData);
                        tx.delete(holdRef); 
                    });

                    // --- DISPARAR NOTIFICACIÓN PUSH AL PROFESIONAL ---
                    fetch('https://turnofacil-backend-4r9k.onrender.com/enviar-notificacion', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            profId: profId,
                            titulo: '¡Nuevo turno reservado! 📅',
                            mensaje: `${clientName} agendó para el ${formatDate(selectedDate)} a las ${selectedTime}hs.`
                        })
                    }).catch(err => console.error("Error al disparar push:", err));
                    // --------------------------------------------------

                    clearHoldState(); currentHoldRef.current = null; remainingSecsRef.current = 120; 

                    const mensajeWS = encodeURIComponent(`Hola ${prof.business}! 👋\n\nAcabo de reservar un turno:\n📅 Fecha: ${formatDate(selectedDate)}\n⏰ Hora: ${selectedTime} hs\n👤 Nombre: ${clientName}\n\nAdjunto aquí el comprobante de transferencia por la reserva. ¡Muchas gracias!`);

                    setDialog({
                        type: 'alert',
                        title: '¡Reserva Registrada! 📝',
                        message: (
                            <div className="text-center">
                                <p className="mb-2 text-sm text-neutral-600">Para confirmar tu turno, transferí a este Alias/CBU:</p>
                                <div className="mb-4">
                                    <div className="text-lg font-extrabold text-brand-700 bg-brand-50 py-3 px-4 rounded-xl border-2 border-brand-200 tracking-wide break-all">
                                        {prof.bankAlias || '(Solicitar por WhatsApp)'}
                                    </div>
                                    {prof.bankAlias && (
                                        <button 
                                            type="button"
                                            onClick={(e) => {
                                                e.preventDefault();
                                                navigator.clipboard.writeText(prof.bankAlias)
                                                    .then(() => setToast({type:'success', message:'¡Alias copiado al portapapeles!'}))
                                                    .catch(() => setToast({type:'error', message:'No se pudo copiar'}));
                                            }}
                                            className="mt-2 text-xs font-bold text-brand-600 hover:text-brand-800 transition"
                                        >
                                            📋 Tocar para copiar Alias
                                        </button>
                                    )}
                                </div>
                                <p className="text-[11px] text-neutral-500">Al tocar "Entendido", abriremos WhatsApp para que envíes el comprobante.</p>
                            </div>
                        ),
                        onConfirm: () => {
                            window.location.href = `https://wa.me/${prof.phone}?text=${mensajeWS}`;
                            setSent({ 
                                date: selectedDate, 
                                time: selectedTime, 
                                client: clientName,
                                method: 'transfer',
                                alias: prof.bankAlias,
                                waLink: `https://wa.me/${prof.phone}?text=${mensajeWS}`
                            });
                        }
                    });
                }
            } catch (err) { 
                console.error(err); 
                setToast({ type:'error', message: err.message }); 
            } finally { setBooking(false); }
        };

        if (profExpired) return (
            <div className="h-screen flex items-center justify-center p-6 bg-brand-50 text-center fade-in">
                <div className="bg-white p-8 rounded-4xl shadow-xl max-w-sm w-full border border-neutral-100">
                    <span className="text-5xl block mb-4">⚠️</span>
                    <h2 className="text-xl font-bold mb-2">Servicio temporalmente inactivo</h2>
                    <p className="text-neutral-500 text-sm">El sistema de reservas de este negocio se encuentra en pausa. Volvé a intentar más tarde.</p>
                </div>
            </div>
        );

        if (sent) {
            const openGoogleCalendar = () => {
                const [y,m,d] = sent.date.split('-').map(Number);
                const [h,min] = sent.time.split(':').map(Number);
                
                const pad = n => String(n).padStart(2,'0');
                const startStr = `${y}${pad(m)}${pad(d)}T${pad(h)}${pad(min)}00`;
                
                const dur = prof?.config?.duration || 30;
                const dObj = new Date(y, m-1, d, h, min);
                dObj.setMinutes(dObj.getMinutes() + dur);
                const endStr = `${dObj.getFullYear()}${pad(dObj.getMonth()+1)}${pad(dObj.getDate())}T${pad(dObj.getHours())}${pad(dObj.getMinutes())}00`;

                const title = encodeURIComponent(`Turno en ${prof?.business || ''}`);
                const details = encodeURIComponent(`Turno reservado online.`);
                const loc = encodeURIComponent(prof?.address || '');
                
                const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startStr}/${endStr}&details=${details}&location=${loc}`;
                window.open(url, '_blank');
            };

            // NUEVO: Generar mensaje y link de WhatsApp para el profesional
            const waMessage = encodeURIComponent(`¡Hola! Acabo de reservar un turno.\n\n👤 Nombre: ${sent.client}\n📅 Fecha: ${formatDate(sent.date)}\n⏰ Hora: ${sent.time} hs\n\n¡Gracias!`);
            const waLink = sent.method === 'transfer' ? sent.waLink : `https://wa.me/${prof?.phone}?text=${waMessage}`;

            return (
                <div className="h-screen flex items-center justify-center p-6 bg-brand-50 text-center fade-in">
                    <div className="bg-white p-10 rounded-4xl shadow-xl max-w-sm border border-neutral-100 w-full">
                        <div className="w-20 h-20 custom-bg rounded-full flex items-center justify-center mx-auto mb-4 text-5xl border border-white">✓</div>
                        <h2 className="text-2xl font-bold tracking-tight">{sent.method === 'transfer' ? '¡Reserva Registrada!' : '¡Turno Confirmado!'}</h2>
                        <p className="text-neutral-500 text-sm mt-1 mb-4">{prof?.business}</p>
                        <div className="bg-neutral-50 rounded-2xl p-4 border custom-border mb-4">
                            <p className="custom-text font-semibold text-lg">{formatDate(sent.date)}</p>
                            <p className="custom-text font-bold text-2xl">{sent.time} hs</p>
                            {prof?.address && (
                                <p className="text-neutral-500 text-xs mt-2">📍 {prof.address}</p>
                            )}
                        </div>

                        {sent.method === 'transfer' && sent.alias && (
                            <div className="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-4 text-left">
                                <p className="text-xs text-blue-600 font-bold uppercase mb-1">Para confirmar tu turno, transferí a:</p>
                                <p className="text-lg font-extrabold text-blue-800 tracking-wide">{sent.alias}</p>
                                <p className="text-[10px] text-blue-500 mt-1">Luego enviá el comprobante por WhatsApp.</p>
                            </div>
                        )}
                        
                        {/* Botón de WhatsApp destacado */}
                        <a href={waLink} target="_blank" rel="noopener noreferrer" className="w-full bg-[#25D366] text-white py-3.5 rounded-2xl text-sm font-bold mb-3 flex items-center justify-center gap-2 active:scale-95 transition hover:bg-[#20bd5a] shadow-md">
                            <IconWhatsapp /> {sent.method === 'transfer' ? 'Enviar comprobante por WhatsApp' : 'Avisar al profesional'}
                        </a>

                        {prof?.address && (
                            <button type="button" onClick={() => openMaps(prof.address, prof.addressLat, prof.addressLng)} className="w-full bg-neutral-100 text-neutral-700 border border-neutral-200 py-2.5 rounded-2xl text-sm font-medium mb-2 flex items-center justify-center gap-2 active:scale-95 transition hover:bg-neutral-200">
                                🗺️ Cómo llegar
                            </button>
                        )}
                        <button type="button" onClick={openGoogleCalendar} className="w-full bg-neutral-100 text-neutral-700 border border-neutral-200 py-2.5 rounded-2xl text-sm font-medium mb-2 flex items-center justify-center gap-2 active:scale-95 transition hover:bg-neutral-200">
                            📅 Agregar a Google Calendar
                        </button>
                        <button type="button" onClick={() => { setSent(null); setSelectedDate(''); setSelectedTime(''); setBookedTimes([]); setClientView('cancel'); }} className="mt-2 w-full custom-text border custom-border py-2.5 rounded-2xl text-sm font-medium transition">Ver mis turnos</button>
                    </div>
                </div>
            );
        }

        if (!prof) return <Spinner />;

        const today = getTodayStr(); let availableSlots = [];
        let isDayUnavailable = false;
        if (selectedDate && !loadingSlots) {
            const isWork = prof.config.workingDays.includes(parseDateLocal(selectedDate).getDay()) && !(prof.config.blockedDates||[]).includes(selectedDate);
            if (isWork) {
                const maxPerDay = prof.config.maxPerDay || 0;
                if (maxPerDay > 0 && bookedTimes.length >= maxPerDay) {
                    isDayUnavailable = true;
                } else {
                    availableSlots = generateTimeSlots(prof.config.startTime, prof.config.endTime, prof.config.duration).filter(t => !bookedTimes.includes(t));
                }
            } else isDayUnavailable = true;
            if (selectedDate === today) { const nowMins = new Date().getHours()*60 + new Date().getMinutes(); availableSlots = availableSlots.filter(t => (Number(t.split(':')[0])*60+Number(t.split(':')[1])) > nowMins); }
        }

        return (
            <div className="max-w-md mx-auto p-6 pb-12 fade-in">
                <div className="text-center mb-8 mt-6">
                    {prof.logoBase64 ? <img src={prof.logoBase64} className="w-24 h-24 rounded-4xl mx-auto mb-5 object-cover shadow-xl border-4 border-white" />
                                     : <div className="w-24 h-24 custom-bg rounded-4xl mx-auto flex items-center justify-center text-5xl font-bold mb-5 shadow-xl border-4 border-white">{(prof.business || '?').charAt(0).toUpperCase()}</div>}
                    <h1 className="text-2xl font-bold text-neutral-950 tracking-tighter">{prof.business}</h1>
                    <p className="custom-text font-medium">{prof.service || 'Reserva tu cita online'}</p>
                    
                    {prof.price && (
                        <div className="mt-2 inline-flex items-center gap-1.5 px-4 py-1.5 bg-white text-neutral-800 rounded-full font-bold text-sm shadow-sm border border-neutral-100">
                            💵 {prof.price}
                        </div>
                    )}
                    
                    {prof.address && (
                        <div className="mt-3">
                            <button
                                type="button"
                                onClick={() => openMaps(prof.address, prof.addressLat, prof.addressLng)}
                                className="inline-flex items-center gap-1.5 text-xs text-neutral-500 hover:text-neutral-800 bg-white hover:bg-neutral-100 shadow-sm border border-neutral-100 px-3 py-1.5 rounded-xl transition active:scale-95"
                            >
                                📍 {prof.address}
                            </button>
                        </div>
                    )}
                </div>

                <div className="flex gap-2 mb-6 bg-white p-1.5 rounded-2xl border border-neutral-100 shadow-sm">
                    <button type="button" onClick={() => setClientView('book')} className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-colors ${clientView==='book' ? 'custom-bg shadow-md' : 'text-neutral-500'}`}>📅 Reservar</button>
                    <button type="button" onClick={() => { abandonHold(true); setSelectedTime(''); setClientView('cancel'); }} className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-colors ${clientView==='cancel' ? 'custom-bg shadow-md' : 'text-neutral-500'}`}>Mis turnos</button>
                </div>

                {clientView === 'book' ? (
                    <form onSubmit={handleBooking} className="bg-white p-6 sm:p-8 rounded-4xl shadow-xl shadow-brand-100/50 space-y-6 border border-neutral-100">
                        <input type="date" min={today} value={selectedDate} onChange={e => { if (e.target.value) { setSelectedDate(e.target.value); setSelectedTime(''); } }} className="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none text-sm font-medium" required />
                        {selectedDate && (
                            isDayUnavailable ? (
                                <div className="text-center py-5 text-sm text-neutral-500 bg-neutral-50 rounded-2xl border border-neutral-200 fade-in">🚫 Este día no está disponible.</div>
                            ) : loadingSlots ? (
                                <div className="text-center py-5 text-sm text-neutral-400 bg-neutral-50 rounded-2xl border border-neutral-200 fade-in flex items-center justify-center gap-2">
                                    <div className="w-4 h-4 border-2 border-neutral-400 border-t-transparent rounded-full animate-spin"></div> Cargando horarios...
                                </div>
                            ) : availableSlots.length === 0 ? (
                                <div className="text-center p-5 bg-neutral-50 rounded-2xl border border-neutral-200 fade-in">
                                    <p className="text-sm text-neutral-600 font-medium mb-3">😔 No quedan turnos disponibles para este día.</p>
                                    
                                    {!showWaitlistForm ? (
                                        <button type="button" onClick={() => setShowWaitlistForm(true)} className="custom-text border custom-border px-4 py-2 rounded-xl text-sm font-bold active:scale-95 transition">
                                            🔔 Anotarme en Lista de Espera
                                        </button>
                                    ) : (
                                        <div className="bg-white p-4 rounded-xl shadow-sm text-left border border-neutral-100 mt-2 fade-in">
                                            <p className="text-xs text-neutral-500 font-semibold mb-3">Te avisaremos si alguien cancela y se libera un turno.</p>
                                            <input id="waitlistClient" name="waitlistClient" maxLength="50" placeholder="Nombre y apellido" className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-xl outline-none text-sm mb-3" required />
                                            <PhoneInput namePrefix="waitlistPhonePrefix" nameLocal="waitlistPhoneLocal" prefix={waitlistPhonePrefix} onPrefixChange={setWaitlistPhonePrefix} value={waitlistPhoneLocal} onChange={e => setWaitlistPhoneLocal(e.target.value.replace(/\D/g,''))} placeholder="Tu WhatsApp" required />
                                            <div className="flex gap-2 mt-4">
                                                <button type="button" onClick={() => setShowWaitlistForm(false)} className="flex-1 py-2 text-neutral-500 font-medium text-sm transition hover:bg-neutral-50 rounded-xl">Cancelar</button>
                                                <button type="button" onClick={handleWaitlist} disabled={booking} className={`flex-1 custom-bg text-white py-2 rounded-xl font-bold text-sm transition ${booking ? 'opacity-70' : 'active:scale-95'}`}>
                                                    {booking ? '...' : 'Anotarme'}
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="grid grid-cols-3 gap-2 max-h-48 overflow-y-auto p-1 fade-in">
                                    {availableSlots.map(time => (
                                        <button type="button" key={time} onClick={() => selectTime(time)} disabled={selectingSlot} className={`py-2 rounded-xl text-sm font-semibold transition-all ${selectedTime===time ? 'custom-bg shadow-md' : 'bg-neutral-50 text-neutral-700 border border-neutral-200'} ${selectingSlot ? 'opacity-60 cursor-wait' : ''}`}>{time}</button>
                                    ))}
                                </div>
                            )
                        )}
                        {selectedTime && holdSecondsLeft !== null && (
                            <div className={`flex items-center justify-between px-4 py-3 rounded-2xl border fade-in ${holdSecondsLeft <= 30 ? 'bg-red-50 border-red-200' : 'bg-amber-50 border-amber-200'}`}>
                                <div className="flex items-center gap-2">
                                    <span className="text-lg">⏱</span>
                                    <div>
                                        <p className={`text-xs font-bold ${holdSecondsLeft <= 30 ? 'text-red-700' : 'text-amber-700'}`}>Turno reservado por vos</p>
                                        <p className={`text-[10px] ${holdSecondsLeft <= 30 ? 'text-red-500' : 'text-amber-600'}`}>Completá el formulario antes de que expire</p>
                                    </div>
                                </div>
                                <div className={`text-2xl font-bold tabular-nums ${holdSecondsLeft <= 30 ? 'text-red-600' : 'text-amber-600'}`}>
                                    {String(Math.floor(holdSecondsLeft/60)).padStart(2,'0')}:{String(holdSecondsLeft%60).padStart(2,'0')}
                                </div>
                            </div>
                        )}
                        <div className={`border-t border-neutral-100 pt-6 space-y-4 transition-all ${!selectedTime ? 'opacity-50 pointer-events-none hidden' : 'block'}`}>
                            <input name="clientName" maxLength="50" placeholder="Nombre y apellido" className="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none mb-4" required />
                            <input name="dni" maxLength="15" placeholder="DNI (sin puntos)" inputMode="numeric" pattern="[0-9]*" className="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none" required />
                            <PhoneInput namePrefix="phonePrefix" nameLocal="phoneLocal" prefix={phonePrefix} onPrefixChange={setPhonePrefix} value={phoneLocal} onChange={e => setPhoneLocal(e.target.value.replace(/\D/g,''))} placeholder="Sin 0 ni 15" required />
                            <input name="notes" maxLength="200" placeholder="Alguna nota o comentario (opcional)" className="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none" />
                            <button type="submit" disabled={booking} className={`w-full custom-bg p-5 rounded-2xl font-semibold shadow-lg mt-2 transition text-lg text-white flex items-center justify-center gap-3 ${booking ? 'opacity-80 cursor-wait' : 'active:scale-[0.98]'}`}>
                                {booking ? (
                                    <>
                                        <svg className="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        {(!prof?.paymentMethod || prof.paymentMethod === 'mercadopago') 
                                            ? 'Generando link seguro. Espere por favor...' 
                                            : 'Procesando reserva...'}
                                    </>
                                ) : (
                                    'Confirmar Reserva'
                                )}
                            </button>
                        </div>
                    </form>
                ) : (
                    <CancelView profId={profId} setDialog={setDialog} setToast={setToast} onReschedule={() => { abandonHold(true); setClientView('book'); setSelectedDate(''); setSelectedTime(''); }} />
                )}
            </div>
        );
    }

    // ===================== CANCEL VIEW =====================
    function CancelView({ profId, setDialog, setToast, onReschedule }) {
        const [searchDni, setSearchDni] = useState('');
        const [searchPhonePrefix, setSearchPhonePrefix] = useState('54');
        const [searchPhoneLocal, setSearchPhoneLocal] = useState('');
        const [myApts, setMyApts]       = useState(null);
        const [searching, setSearching] = useState(false);
        const mountedRef = useRef(true);

        useEffect(() => {
            mountedRef.current = true; return () => { mountedRef.current = false; };
        }, []);

        const searchApts = async () => {
            if (searching) return;
            const dniClean = searchDni.replace(/\D/g,'');
            const phoneClean = searchPhoneLocal.replace(/\D/g,'');
            if (dniClean.length < 6) { setToast({ type:'error', message:'Ingresá un DNI válido.' }); return; }
            if (phoneClean.length < 8) { setToast({ type:'error', message:'Ingresá el WhatsApp que usaste para reservar.' }); return; }
            
            const fullSearchPhone = buildPhone(searchPhonePrefix, searchPhoneLocal);
            setSearching(true);
            try {
                const today = getTodayStr();
                const snap  = await db.collection("appointments").where("profId","==",profId).where("dni","==",dniClean).get();
                if (!mountedRef.current) return;
                
                const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
                const isFuture = (a) => {
                    if (a.date > today) return true;
                    if (a.date === today) { const [h,m] = a.time.split(':').map(Number); return (h*60+m) >= nowMins; }
                    return false;
                };
                
                const list = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => {
                    if (a.cancelled !== b.cancelled) return a.cancelled ? 1 : -1;
                    return a.date.localeCompare(b.date) || a.time.localeCompare(b.time);
                });
                
                const thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
                const thirtyStr = `${thirtyDaysAgo.getFullYear()}-${String(thirtyDaysAgo.getMonth()+1).padStart(2,'0')}-${String(thirtyDaysAgo.getDate()).padStart(2,'0')}`;
                
                const filtered = list.filter(a => {
                    if (a.phone !== fullSearchPhone) return false; 
                    if (a.cancelled) return a.date >= thirtyStr; 
                    return isFuture(a); 
                });
                setMyApts(filtered);
            } catch (err) { if (mountedRef.current) setToast({ type:'error', message:'Error al buscar turnos.' }); } finally { if (mountedRef.current) setSearching(false); }
        };

        const cancelApt = (apt) => {
            setDialog({
                type:'confirm', title:'Cancelar Turno', message:`¿Querés cancelar el turno del ${formatDate(apt.date)} a las ${apt.time}hs?`,
                onConfirm: async () => {
                    try {
                        await db.collection("appointments").doc(apt.id).update({ cancelled: true, cancelledAt: firebase.firestore.FieldValue.serverTimestamp(), cancelledBy: 'client' });
                        setMyApts(prev => prev.map(a => a.id === apt.id ? {...a, cancelled:true, cancelledBy:'client'} : a));
                        setToast({type:'success', message:'Turno cancelado'});
                    } catch (err) { setToast({ type:'error', message:'No se pudo cancelar.' }); }
                }
            });
        };

        const rescheduleApt = (apt) => {
            setDialog({
                type:'confirm', title:'Reprogramar Turno', message:`Cancelamos el turno del ${formatDate(apt.date)} a las ${apt.time}hs para elegir uno nuevo. ¿Continuás?`,
                onConfirm: async () => {
                    try {
                        await db.collection("appointments").doc(apt.id).update({ cancelled: true, cancelledAt: firebase.firestore.FieldValue.serverTimestamp(), cancelledBy: 'client_reschedule' });
                        setMyApts(prev => prev.map(a => a.id === apt.id ? {...a, cancelled:true, cancelledBy:'client_reschedule'} : a));
                        setToast({ type:'success', message:'Turno cancelado. Elegí nueva fecha.' });
                        if (onReschedule) onReschedule();
                    } catch (err) { setToast({ type:'error', message:'No se pudo reprogramar.' }); }
                }
            });
        };

        return (
            <div className="bg-white p-6 sm:p-8 rounded-4xl shadow-xl shadow-brand-100/50 space-y-6 border border-neutral-100 fade-in">
                <div><h3 className="text-lg font-bold mb-1">Mis turnos</h3><p className="text-sm text-neutral-500">Ingresá tus datos para ver o cancelar tus turnos.</p></div>
                <div className="space-y-3">
                    <input
                        type="text" inputMode="numeric" pattern="[0-9]*" maxLength="15"
                        value={searchDni} onChange={e => setSearchDni(e.target.value.replace(/\D/g,''))}
                        placeholder="Tu DNI (sin puntos)"
                        className="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none text-sm focus:border-brand-600"
                    />
                    <PhoneInput namePrefix="searchPhonePrefix" nameLocal="searchPhoneLocal" prefix={searchPhonePrefix} onPrefixChange={setSearchPhonePrefix} value={searchPhoneLocal} onChange={e => setSearchPhoneLocal(e.target.value.replace(/\D/g,''))} placeholder="Tu WhatsApp (sin 0 ni 15)" required />
                    
                    <button type="button" onClick={searchApts} disabled={searching} className="w-full custom-bg py-3.5 mt-2 rounded-2xl font-semibold active:scale-95 transition flex items-center justify-center gap-2 text-sm text-white">
                        {searching ? 'Buscando...' : <><IconSearch /> Buscar mis turnos</>}
                    </button>
                </div>
                {myApts !== null && (
                    <div className="fade-in">
                        {myApts.length === 0 ? (
                            <div className="text-center py-8 text-neutral-500 text-sm bg-neutral-50 rounded-2xl border border-neutral-100"><span className="text-3xl block mb-2">🔍</span>No encontramos turnos para este DNI y celular.</div>
                        ) : (
                            <div className="space-y-3">
                                {myApts.map(apt => (
                                    <div key={apt.id} className={`border rounded-2xl p-4 space-y-3 fade-in ${apt.cancelled ? 'bg-red-50 border-red-200 opacity-75' : 'bg-neutral-50 border-neutral-200'}`}>
                                        <div>
                                            <div className={`font-bold px-3 py-1 rounded-xl text-sm border inline-block mb-1 ${apt.cancelled ? 'bg-red-100 text-red-700 border-red-200' : 'bg-brand-50 text-brand-700 border-brand-100'}`}>
                                                {formatDate(apt.date)} · {apt.time} hs
                                            </div>
                                            {apt.cancelled && <span className="ml-2 text-xs font-bold text-red-600 bg-red-100 px-2 py-0.5 rounded-lg border border-red-200">❌ Cancelado</span>}
                                            <div className="font-semibold text-neutral-800 mt-1">{apt.client}</div>
                                        </div>
                                        {!apt.cancelled && !apt.addedManually && (
                                            <div className="flex gap-2 pt-1 border-t border-neutral-200">
                                                <button type="button" onClick={() => rescheduleApt(apt)} className="flex-1 text-brand-600 bg-brand-50 border border-brand-100 py-2 rounded-xl text-xs font-semibold flex items-center justify-center gap-1 active:scale-95 transition">📅 Reprogramar</button>
                                                <button type="button" onClick={() => cancelApt(apt)} className="text-red-500 bg-red-50 border border-red-100 px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-1 active:scale-95 transition"><IconTrash /></button>
                                            </div>
                                        )}
                                        {!apt.cancelled && apt.addedManually && (
                                            <div className="pt-1 border-t border-neutral-200">
                                                <p className="text-xs text-neutral-400 text-center py-1">Para modificar este turno contactá al negocio.</p>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
