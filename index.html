    // --- Componente Toast (Notificación Flotante) ---
    const Toast = ({ toast, onClose }) => {
        useEffect(() => {
            if (toast) { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }
        }, [toast]); 
        if (!toast) return null;
        const bg = toast.type === 'error' ? 'bg-red-600' : 'bg-neutral-900';
        return (
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] slide-up w-11/12 max-w-sm">
                <div className={`px-6 py-3 rounded-2xl shadow-2xl text-sm font-bold text-white flex items-center gap-2 ${bg} border border-white/20 w-full`}>
                    {toast.type === 'error' ? '❌' : '✅'} {toast.message}
                </div>
            </div>
        );
    };

    // --- Helpers ---
    const COUNTRY_CODES = [
        { code:'54',  label:'+54 AR' }, { code:'598', label:'+598 UY' }, { code:'56',  label:'+56 CL' },
        { code:'55',  label:'+55 BR' }, { code:'595', label:'+595 PY' }, { code:'591', label:'+591 BO' },
        { code:'57',  label:'+57 CO' }, { code:'51',  label:'+51 PE' }, { code:'34',  label:'+34 ES' },
        { code:'1',   label:'+1 US'  },
    ];
    const buildPhone = (prefix, local) => {
        const cleanLocal = local.replace(/\D/g,'');
        // Argentina: WhatsApp exige el "9" entre el 54 y el número de área (ej: 549 11 XXXX-XXXX)
        if (String(prefix) === '54') return `549${cleanLocal.replace(/^9/, '')}`;
        return prefix + cleanLocal;
    };

    const PhoneInput = ({ namePrefix='phonePrefix', nameLocal='phoneLocal', prefix, onPrefixChange, value, onChange, placeholder='1122334455', required=false }) => (
        <div className="flex">
            <select name={namePrefix} value={prefix} onChange={e => onPrefixChange(e.target.value)}
                className="bg-neutral-50 border border-neutral-200 border-r-0 rounded-l-2xl px-2 py-4 text-sm outline-none focus:border-brand-600 font-medium text-neutral-600">
                {COUNTRY_CODES.map(c => <option key={c.code} value={c.code}>{c.label}</option>)}
            </select>
            <input name={nameLocal} type="tel" value={value} onChange={onChange} placeholder={placeholder} className="flex-1 p-4 text-sm bg-neutral-50 border border-neutral-200 rounded-r-2xl outline-none focus:border-brand-600" required={required} />
        </div>
    );

    const generateTimeSlots = (start, end, durationMins) => {
        if (!durationMins || durationMins <= 0) return [];
        const slots = []; 
        let [sh, sm] = start.split(':').map(Number); 
        let [eh, em] = end.split(':').map(Number);
        let cur = sh * 60 + sm; 
        let endM = eh * 60 + em;
        if (endM <= cur) endM += 24 * 60;
        
        let safeGuard = 0;
        while (cur + durationMins <= endM && safeGuard < 100) {
            const h = Math.floor(cur / 60) % 24;
            const m = cur % 60;
            slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
            cur += durationMins;
            safeGuard++;
        }
        return slots;
    };
    
    const parseDateLocal = (s) => { if (!s || !s.includes('-')) return new Date(NaN); const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
    const formatDate    = (s) => s ? s.split('-').reverse().join('/') : '';
    const getTodayStr   = () => { 
        try { return new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Argentina/Buenos_Aires', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date()); } 
        catch(e) { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    };
    const getDaysLeft   = (expiresAt) => {
        if (!expiresAt) return 0;
        const ms = expiresAt?.toDate ? expiresAt.toDate().getTime() : new Date(expiresAt).getTime();
        if (isNaN(ms)) return 0;
        const diff = ms - new Date().getTime();

            let safeUrl;
            try {

                if (parsed.protocol !== 'https:' && parsed.protocol !== 'http:') return url;
                safeUrl = parsed.href.replace(/"/g, '%22').replace(/'/g, '%27');

    const getAudioCtx = () => {
        if (!_sharedAudioCtx || _sharedAudioCtx.state === 'closed') {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return null;
            _sharedAudioCtx = new AC();
        }
        return _sharedAudioCtx;
    };
    const playNotificationSound = () => {
        try {
            const ctx = getAudioCtx(); if (!ctx) return;
            const play = () => {
                const playTone = (freq, delay, duration) => {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'sine'; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, ctx.currentTime + delay);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
                    osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + duration);
                };

    // ===================== APP =====================
    function App() {
        const [user, setUser]     = useState(null);
        const [view, setView]     = useState('loading');
        const [profId, setProfId] = useState(null);
        const [dialog, setDialog] = useState(null);
        const [toast, setToast]   = useState(null);
        const [globalSettings, setGlobalSettings] = useState(null);
        const [paymentSettings, setPaymentSettings] = useState(null);

        useEffect(() => {
            const unsubSettings = db.collection('settings').doc('global').onSnapshot(doc => {
                if(doc.exists) setGlobalSettings(doc.data());
                else setGlobalSettings({});
            });
            const unsubPayment = db.collection('settings').doc('payment').onSnapshot(doc => {
                if(doc.exists) setPaymentSettings(doc.data());
                else setPaymentSettings({ mpPrice: '5000', paypalPrice: '15' });
            });
            return () => { unsubSettings(); unsubPayment(); };
        }, []);

        useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p');
            const unsub = auth.onAuthStateChanged(async (u) => {
                setUser(u);
                if (p) { 
                    if (p.length > 20) {
                        setProfId(p); 
                        setView('client'); 
                    } else {
                        try {
                            const snap = await db.collection("professionals").where("slug", "==", p).limit(1).get();
                            if (!snap.empty) {
                                setProfId(snap.docs[0].id);
                                setView('client');
                            } else {
                                alert("No pudimos encontrar este negocio. Revisa el link.");
                                setView('landing');
                            }
                        } catch(e) {
                            setView('landing');
                        }
                    }
                } else if (u && !u.isAnonymous) { 
                    const checkedUid = u.uid;
                    try {
                        const adminDoc = await db.collection("admins").doc(checkedUid).get();
                        if (auth.currentUser?.uid !== checkedUid) return;
                        if (adminDoc.exists) { setView('superadmin'); } else { setView('admin'); }
                    } catch (error) { if (auth.currentUser?.uid === checkedUid) setView('admin'); }
                } else { 
                    setView('landing'); 
                }
            });
            return () => unsub();
        }, []);

        if (view === 'loading') return <Spinner />;

        // Aplicar Modo Mantenimiento Global (Excepto para SuperAdmin)
        if (globalSettings?.maintenanceMode && view !== 'superadmin' && view !== 'auth' && view !== 'landing') {
            return <MaintenanceView />;
        }

        const startApp = () => setView('auth');

        return (
            <>
                {view === 'landing' ? <LandingView onStart={startApp} paymentSettings={paymentSettings} /> :                 view === 'auth' ? <AuthScreen setDialog={setDialog} setToast={setToast} globalSettings={globalSettings} /> :
                 view === 'client' ? <ClientView profId={profId} setDialog={setDialog} setToast={setToast} /> : 
                 view === 'superadmin' ? <SuperAdminView user={user} setDialog={setDialog} setToast={setToast} /> : 
                 <AdminView user={user} setDialog={setDialog} setToast={setToast} globalSettings={globalSettings} />}
                <CustomDialog dialog={dialog} onClose={() => setDialog(null)} />
                <Toast toast={toast} onClose={() => setToast(null)} />
            </>
        );
    }

    function AuthScreen({ setDialog, setToast, globalSettings }) {
        const [mode, setMode]             = useState('login');
        const [loading, setLoading]       = useState(false);
        const [phonePrefix, setPhonePrefix] = useState('54');
        const [phoneLocal, setPhoneLocal]   = useState('');
        const [showPassword, setShowPassword] = useState(false);

        const isMaintenance = globalSettings?.maintenanceMode;

        // Si activan el mantenimiento mientras alguien estaba en la pestaña de registro, lo forzamos a login
        useEffect(() => {
            if (isMaintenance && mode === 'register') {
                setMode('login');
            }
        }, [isMaintenance, mode]);

        const handleSubmit = async (e) => {
            e.preventDefault(); setLoading(true);
            try {
                if (mode === 'forgot') {
                    await auth.sendPasswordResetEmail(e.target.email.value);
                    setDialog({type:'alert', title:'Correo enviado', message:'Revisá tu correo para restablecer la contraseña.'});
                    setMode('login'); setLoading(false); return;
                }
                if (mode === 'login') {
                    const persistence = e.target.remember?.checked ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
                    await auth.setPersistence(persistence);
                    await auth.signInWithEmailAndPassword(e.target.email.value, e.target.password.value);
                    setToast({ type:'success', message: 'Sesión iniciada' });
                } else {
                    if (isMaintenance) {
                        setToast({ type:'error', message:'Los registros están pausados por mantenimiento.'});
                        setLoading(false); return;
                    }

                    const fullPhone = buildPhone(phonePrefix, phoneLocal);
                    if (phoneLocal.replace(/\D/g,'').length < 8) { setToast({ type:'error', message:'Teléfono inválido.'}); setLoading(false); return; }
                    
                    const res = await auth.createUserWithEmailAndPassword(e.target.email.value, e.target.password.value);
                    const expirationDate = new Date();
                    expirationDate.setDate(expirationDate.getDate() + 30);
                    try {
                        await db.collection("professionals").doc(res.user.uid).set({
                            name: e.target.name.value, business: e.target.business.value,
                            service: e.target.service.value, price: '', phone: fullPhone, email: e.target.email.value,
                            waTemplate: DEFAULT_WA_TEMPLATE,
                            licenseExpiresAt: expirationDate.toISOString(),
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            subscriptionStatus: 'trial', 
                            isSuspended: false,
                            themeColor: '#4f46e5', logoBase64: '', slug: '',
                            config: { workingDays:[1,2,3,4,5], startTime:'09:00', endTime:'18:00', duration:30, maxPerDay:0, blockedDates:[], notificationsEnabled: true }
                        });
                        setToast({ type:'success', message: 'Cuenta creada con éxito' });
                    } catch(dbErr) {
                        await res.user.delete().catch(() => {});
                        throw dbErr;
                    }
                }
            } catch (err) {
                const msgs = { 'auth/user-not-found':'Cuenta no encontrada.', 'auth/wrong-password':'Contraseña incorrecta.', 'auth/invalid-credential':'Email o contraseña incorrectos.', 'auth/email-already-in-use':'Correo ya registrado.', 'auth/weak-password':'La contraseña debe tener al menos 6 caracteres.', 'auth/invalid-email':'El formato del email no es válido.' };
                setToast({ type:'error', message: msgs[err.code] || 'Ocurrió un error.' });
            } finally { setLoading(false); }
        };

        return (
            <div className="min-h-screen flex items-center justify-center p-4 fade-in">
                <div className="w-full max-w-md">
                    <div className="text-center mb-10">
                        <div className="inline-flex items-center justify-center w-20 h-20 bg-white rounded-4xl shadow-xl shadow-brand-100 mb-4 border border-brand-100"><span className="text-4xl">📅</span></div>
                        <h1 className="text-3xl font-bold text-neutral-950 tracking-tighter">Turno Fácil<span className="text-brand-600">Pro</span></h1>
                    </div>
                    <div className="bg-white p-8 rounded-4xl shadow-2xl shadow-brand-100/50 border border-neutral-100">
                        
                        {isMaintenance && (
                            <div className="bg-amber-100 text-amber-800 p-4 rounded-2xl mb-6 text-sm font-semibold text-center border border-amber-200">
                                🛠️ Sistema en mantenimiento. Registros pausados temporalmente.
                            </div>
                        )}

                        <h2 className="text-xl font-semibold mb-1">
                            {mode==='login' ? '¡Hola de nuevo!' : mode==='register' ? 'Registro gratis (30 días)' : 'Recuperar contraseña'}
                        </h2>
                        <p className="text-neutral-500 mb-6 text-sm">
                            {mode==='login' ? 'Ingresá para ver tus turnos.' : mode==='register' ? 'Creá tu cuenta y probá todas las funciones.' : 'Te enviamos un link a tu correo.'}
                        </p>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {mode === 'register' && (<>
                                <input name="name" maxLength="50" className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="Tu nombre" required />
                                <input name="business" maxLength="50" className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="Nombre de tu negocio" required />
                                <input name="service" maxLength="50" className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="¿A qué te dedicás?" required />
                                <PhoneInput prefix={phonePrefix} onPrefixChange={setPhonePrefix} value={phoneLocal} onChange={e => setPhoneLocal(e.target.value)} required />
                            </>)}
                            
                            <input name="email" type="email" className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="Correo electrónico" required />
                            
                            {mode !== 'forgot' && (

                                        <IconLock />

                                    <input

                                        type={showPassword ? "text" : "password"} 
                                        className="w-full pl-12 pr-12 py-3 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm"

                                <div className="flex items-center justify-between">
                                    <label className="flex items-center gap-2 cursor-pointer text-sm text-neutral-600">
                                        <input name="remember" type="checkbox" defaultChecked={true} className="w-4 h-4 rounded accent-brand-600" />
                                        Recordar sesión
                                    </label>
                                </div>
                            )}

                            <button type="submit" disabled={loading} className={`w-full text-white py-4 rounded-2xl font-semibold shadow-lg transition ${loading ? 'bg-brand-400' : 'bg-brand-600 active:scale-[0.98]'}`}>
                                {loading ? 'Procesando...' : mode==='login' ? 'Ingresar' : mode==='register' ? 'Crear Cuenta' : 'Enviar link'}
                            </button>
                        </form>
                        
                        <div className="mt-6 text-center space-y-2">
                            {mode !== 'register' && !isMaintenance && <button type="button" onClick={() => { setMode('register'); setShowPassword(false); }} className="w-full text-brand-600 text-sm font-medium">¿No tenés cuenta? Registrate gratis</button>}
                            {mode === 'login' && <button type="button" onClick={() => { setMode('forgot'); setShowPassword(false); }} className="w-full text-neutral-500 text-sm">Olvidé mi contraseña</button>}
                            {mode !== 'login' && <button type="button" onClick={() => { setMode('login'); setShowPassword(false); }} className="w-full text-neutral-500 text-sm">Volver al inicio</button>}
                        </div>
                    </div>
                </div>
            </div>
        );
    }
// ===================== SUPER ADMIN VIEW =====================
    function SuperAdminView({ user, setDialog, setToast }) {
        const [profs, setProfs] = useState([]);
        const [payments, setPayments] = useState([]);
        const [search, setSearch] = useState('');
        const [filter, setFilter] = useState('all'); 
        const [tab, setTab] = useState('licenses'); // licenses, payments, config
        const [settings, setSettings] = useState({ mpPrice: '5000', paypalPrice: '15' });
        const [globalSettings, setGlobalSettings] = useState({ broadcastMessage: '', maintenanceMode: false, helpText: '' });
        const [mpPriceInput, setMpPriceInput] = useState('');
        const [paypalPriceInput, setPaypalPriceInput] = useState('');
        const [loading, setLoading] = useState(true);
        const [renewModalProf, setRenewModalProf] = useState(null);
        const [renewMode, setRenewMode] = useState('days'); // 'days' | 'date'
        const [renewDays, setRenewDays] = useState(0);
        const [renewExactDate, setRenewExactDate] = useState('');
        const [renewAmount, setRenewAmount] = useState('');
        const [renewMethod, setRenewMethod] = useState('Mercado Pago');
        const [editPaymentModal, setEditPaymentModal] = useState(null); // payment obj being edited

        useEffect(() => {
            const unsubProfs = db.collection("professionals").onSnapshot(
                snap => { setProfs(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoading(false); },
                err => { console.warn('onSnapshot profs error:', err); setLoading(false); }
            );
            const unsubPayments = db.collection("payments").orderBy("date", "desc").limit(100).onSnapshot(
                snap => { setPayments(snap.docs.map(d => ({ id: d.id, ...d.data() }))); }
            );
            let settingsInputsInitialized = false;
            const unsubSettings = db.collection("settings").doc("payment").onSnapshot(
                doc => {
                    if(doc.exists) {
                        const data = doc.data();
                        setSettings(data);
                        if (!settingsInputsInitialized) {
                            settingsInputsInitialized = true;
                            setMpPriceInput(data.mpPrice || '5000');
                            setPaypalPriceInput(data.paypalPrice || '15');
                        }
                    }
                }
            );
            const unsubGlobal = db.collection("settings").doc("global").onSnapshot(
                doc => { if(doc.exists) setGlobalSettings(doc.data()); }
            );

            return () => { unsubProfs(); unsubPayments(); unsubSettings(); unsubGlobal(); };
        }, []);

        const handleMpChange = (e) => setMpPriceInput(e.target.value.replace(/\D/g, ''));
        const handlePaypalChange = (e) => setPaypalPriceInput(e.target.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1'));

        const saveMpPrice = async (e) => {
            e.preventDefault();
            try { await db.collection("settings").doc("payment").set({ mpPrice: mpPriceInput }, { merge: true }); setToast({ type:'success', message:'Precio de Mercado Pago actualizado.' }); } catch(err) { setToast({ type:'error', message:'Error.' }); }
        };

        const savePaypalPrice = async (e) => {
            e.preventDefault();
            try { await db.collection("settings").doc("payment").set({ paypalPrice: paypalPriceInput }, { merge: true }); setToast({ type:'success', message:'Precio de PayPal actualizado.' }); } catch(err) { setToast({ type:'error', message:'Error.' }); }
        };

        const saveGlobalSettings = async (data) => {
            try {
                await db.collection("settings").doc("global").set(data, { merge: true });
                setToast({ type:'success', message:'Ajustes guardados.' });
            } catch(e) { setToast({ type:'error', message:'Error al guardar.' }); }
        };

        const executeRenew = async (e) => {
            e.preventDefault();
            const amount = Number(renewAmount);
            const method = renewMethod;
            const prof = renewModalProf;
            try {
                const now = new Date();
                const rawExp = prof.licenseExpiresAt;
                const currentExp = rawExp ? (rawExp?.toDate ? rawExp.toDate() : new Date(rawExp)) : now;
                const baseDate = currentExp > now ? new Date(currentExp) : new Date(now);
                baseDate.setDate(baseDate.getDate() + Number(renewDays));
                const finalDate = baseDate;
                
                // Actualizar Licencia
                await db.collection("professionals").doc(prof.id).update({ 
                    licenseExpiresAt: finalDate.toISOString(), 
                    subscriptionStatus: 'paid',
                    isSuspended: false 
                });
                
                if (method === 'Bonificado' || amount <= 0) {
                    // Si es bonificado: eliminar el último pago registrado de este profesional (si existe)
                    const lastPaySnap = await db.collection("payments")
                        .where("profId", "==", prof.id)
                        .get();
                    if (!lastPaySnap.empty) {
                        // Ordenar en JS para evitar necesidad de índice compuesto
                        const sorted = lastPaySnap.docs.sort((a, b) => {
                            const aTime = a.data().createdAt?.toMillis?.() || new Date(a.data().date || 0).getTime();
                            const bTime = b.data().createdAt?.toMillis?.() || new Date(b.data().date || 0).getTime();
                            return bTime - aTime;
                        });
                        await sorted[0].ref.delete();
                    }
                    setToast({ type:'success', message: 'Licencia bonificada. Último pago eliminado del historial.' });
                } else {
                    // Guardar nuevo registro de pago
                    await db.collection("payments").add({
                        profId: prof.id,
                        profName: prof.business,
                        amount: amount,
                        method: method,
                        date: new Date().toISOString(),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setToast({ type:'success', message: `Licencia renovada (${renewDays > 0 ? '+' : ''}${renewDays} días) y pago registrado.` });
                }
                setRenewModalProf(null);
            } catch(err) { setToast({ type:'error', message: 'Error al renovar.' }); }
        };

        const deletePayment = (pay) => {
            setDialog({ type:'confirm', title:'Eliminar Pago', message:`¿Eliminar el pago de $${Number(pay.amount).toLocaleString('es-AR')} de ${pay.profName}?`, onConfirm: async () => {
                try { await db.collection("payments").doc(pay.id).delete(); setToast({ type:'success', message:'Pago eliminado.' }); }
                catch(err) { setToast({ type:'error', message:'Error al eliminar.' }); }
            }});
        };

        const saveEditPayment = async (e) => {
            e.preventDefault();
            const pay = editPaymentModal;
            const amount = Number(e.target.editAmount.value);
            const method = e.target.editMethod.value;
            const date = e.target.editDate.value;
            try {
                await db.collection("payments").doc(pay.id).update({ amount, method, date: new Date(date + 'T12:00:00').toISOString() });
                setToast({ type:'success', message:'Pago actualizado.' });
                setEditPaymentModal(null);
            } catch(err) { setToast({ type:'error', message:'Error al guardar.' }); }
        };

        const toggleSuspend = async (prof) => {
            const action = prof.isSuspended ? 'Reactivar' : 'Suspender';

    // ===================== ADD APPOINTMENT MODAL (PROFESSIONAL) =====================
    function AddAppointmentModal({ profId, profile, setToast, onClose }) {
        const [selDate, setSelDate]       = useState('');
        const [selTime, setSelTime]       = useState('');
        const [bookedTimes, setBookedTimes] = useState([]);
        const [loadingSlots, setLoadingSlots] = useState(false);
        const [saving, setSaving]         = useState(false);
        const [manualPrefix, setManualPrefix] = useState('54');
        const [manualPhone,  setManualPhone]  = useState('');

        const today = getTodayStr();

        useEffect(() => {
            if (!selDate) return;
            let active = true;
            setSelTime('');
            setBookedTimes([]);
            setLoadingSlots(true);
            db.collection("appointments").where("profId","==",profId).where("date","==",selDate).get()
                .then(snap => { if (!active) return; setBookedTimes(snap.docs.map(d => d.data()).filter(d => !d.cancelled).map(d => d.time)); setLoadingSlots(false); })
                .catch(() => { if (!active) return; setBookedTimes([]); setLoadingSlots(false); });
            return () => { active = false; };
        }, [selDate]);

        let availableSlots = []; let isDayUnavailable = false; let isBlockedDay = false;
        if (selDate && profile?.config && !loadingSlots) {
            const dayIsWorking = profile.config.workingDays.includes(parseDateLocal(selDate).getDay());
            isBlockedDay = (profile.config.blockedDates||[]).includes(selDate);
            
            availableSlots = generateTimeSlots(profile.config.startTime, profile.config.endTime, profile.config.duration).filter(t => !bookedTimes.includes(t));
            if (!dayIsWorking) {
                isDayUnavailable = true;
            }
        }

        const handleSubmit = async (e) => {
            e.preventDefault();
            if (!selDate || !selTime) { setToast({ type:'error', message:'Elegí una fecha y un horario.' }); return; }
            const localClean = manualPhone.replace(/\D/g,'');
            if (localClean.length < 8) { setToast({ type:'error', message:'Ingresá un teléfono válido.' }); return; }
            setSaving(true);
            try {
                const slotId  = `${profId}_${selDate}_${selTime.replace(':','-')}`;
                const slotRef = db.collection("appointments").doc(slotId);
                const aptData = {
                    profId, date: selDate, time: selTime,
                    client: e.target.manualClient.value.trim(),
                    dni: e.target.manualDni?.value || '',
                    phone: buildPhone(manualPrefix, manualPhone),
                    notes: e.target.manualNotes?.value || '',
                    clientUid: profId,
                    addedManually: true, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                const holdRef = db.collection("holds").doc(slotId);
                await db.runTransaction(async (tx) => {
                    const slotDoc = await tx.get(slotRef);
                    if (slotDoc.exists && !slotDoc.data().cancelled) throw new Error("Ese horario ya fue reservado.");
                    tx.set(slotRef, aptData);
                    tx.delete(holdRef);
                });
                setToast({ type:'success', message:'¡Turno agregado correctamente!' });
                onClose();
            } catch (err) {
                setToast({ type:'error', message: err.message || 'Error al guardar el turno.' });
            } finally { setSaving(false); }
        };

        return (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-neutral-900/60 backdrop-blur-sm fade-in p-4" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                <div className="bg-white p-6 sm:p-8 rounded-4xl shadow-2xl max-w-md w-full border border-neutral-100 relative max-h-[92vh] overflow-y-auto">
                    <button type="button" onClick={onClose} className="absolute top-4 right-5 text-neutral-400 hover:text-neutral-900 text-3xl font-light leading-none">×</button>
                    <h2 className="text-xl font-bold mb-1">Agregar Turno Manual</h2>
                    <p className="text-sm text-neutral-500 mb-6">Reservá un turno en nombre de un cliente.</p>

                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div>
                            <label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">Fecha</label>
                            <input type="date" min={today} value={selDate} onChange={e => { if (e.target.value) setSelDate(e.target.value); }}
                                className="w-full p-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none text-sm font-medium focus:border-brand-600" required />
                        </div>

                        {selDate && (
                            <div>
                                <label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">Horario Disponible</label>
                                {isBlockedDay && availableSlots.length > 0 && (
                                    <div className="mb-2 text-xs text-orange-700 bg-orange-50 border border-orange-200 rounded-xl px-3 py-2">
                                        ⚠️ Este día está bloqueado para clientes, pero podés reservar igual como profesional.
                                    </div>
                                )}
                                {isDayUnavailable && availableSlots.length > 0 && (
                                    <div className="mb-2 text-xs text-orange-700 bg-orange-50 border border-orange-200 rounded-xl px-3 py-2">
                                        ⚠️ Este día no es laborable según tu configuración, pero podés forzar el turno.
                                    </div>
                                )}
                                {loadingSlots ? (
                                    <div className="text-center py-4 text-sm text-neutral-400 bg-neutral-50 rounded-2xl border border-neutral-200 flex items-center justify-center gap-2">
                                        <div className="w-4 h-4 border-2 border-neutral-400 border-t-transparent rounded-full animate-spin"></div> Cargando horarios...
                                    </div>
                                ) : availableSlots.length === 0 ? (
                                    <div className="text-center py-4 text-sm text-neutral-500 bg-neutral-50 rounded-2xl border border-neutral-200">😔 No hay turnos disponibles para este día.</div>
                                ) : (
                                    <div className="grid grid-cols-4 gap-2 max-h-36 overflow-y-auto p-1 bg-neutral-50 border border-neutral-200 rounded-2xl">
                                        {availableSlots.map(t => (
                                            <button type="button" key={t} onClick={() => setSelTime(t)}
                                                className={`py-2 rounded-xl text-sm font-semibold transition-all ${selTime===t ? 'bg-brand-600 text-white shadow-md' : 'bg-white text-neutral-700 border border-neutral-200 hover:border-brand-400'}`}>{t}</button>
                                        ))}
                                    </div>
                                )}
                                {selTime && <p className="text-xs text-brand-600 font-semibold mt-1.5">✔ Horario seleccionado: {selTime} hs</p>}
                            </div>
                        )}

                        <div className={`space-y-3 border-t border-neutral-100 pt-4 transition-all ${!selTime ? 'opacity-50 pointer-events-none' : ''}`}>
                            <div>
                                <label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">Nombre y Apellido</label>
                                <input name="manualClient" maxLength="50" placeholder="Ej: Juan Pérez" className="w-full p-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none text-sm focus:border-brand-600" required />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">DNI <span className="normal-case font-normal text-neutral-400">(opcional)</span></label>
                                <input name="manualDni" maxLength="15" placeholder="Sin puntos" inputMode="numeric" pattern="[0-9]*" className="w-full p-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none text-sm focus:border-brand-600" />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">WhatsApp</label>
                                <PhoneInput namePrefix="manualPhonePrefix" nameLocal="manualPhoneLocal" prefix={manualPrefix} onPrefixChange={setManualPrefix} value={manualPhone} onChange={e => setManualPhone(e.target.value.replace(/\D/g,''))} placeholder="1122334455" required />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">Nota (opcional)</label>
                                <input name="manualNotes" maxLength="200" placeholder="Alguna observación..." className="w-full p-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none text-sm focus:border-brand-600" />
                            </div>
                        </div>

                        <button type="submit" disabled={saving || !selTime} className={`w-full py-4 rounded-2xl font-semibold text-white shadow-lg transition text-sm ${saving || !selTime ? 'bg-brand-300 cursor-not-allowed' : 'bg-brand-600 active:scale-[0.98] hover:bg-brand-700'}`}>
                            {saving ? 'Guardando...' : '✔ Confirmar Turno'}
                        </button>
                    </form>
                </div>
            </div>
        );
    }

    // ===================== MAP PICKER MODAL (LEAFLET + GPS) =====================
    function MapPickerModal({ currentAddress, onConfirm, onClose, setToast }) {
        const mapRef = useRef(null);
        const leafletMap = useRef(null);
        const markerRef = useRef(null);
        const mountedRef = useRef(true);
        const [pickedAddress, setPickedAddress] = useState(currentAddress || '');
        const [pickedLat, setPickedLat] = useState(null);
        const [pickedLng, setPickedLng] = useState(null);
        const [loading, setLoading] = useState(false);
        const [searchInput, setSearchInput] = useState(currentAddress || '');

        useEffect(() => {
            mountedRef.current = true;
            return () => { mountedRef.current = false; };
        }, []);

        useEffect(() => {
            if (leafletMap.current) return; 

            const defaultLat = -34.6037;
            const defaultLng = -58.3816;

            leafletMap.current = L.map(mapRef.current, { zoomControl: true }).setView([defaultLat, defaultLng], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19,
            }).addTo(leafletMap.current);

            const timer = setTimeout(() => { if (leafletMap.current) leafletMap.current.invalidateSize(); }, 350);

            markerRef.current = L.marker([defaultLat, defaultLng], { draggable: true })
                .addTo(leafletMap.current)
                .bindPopup('Arrastrá el marcador a tu ubicación')
                .openPopup();

            const onMarkerMove = async (e) => {
                const { lat, lng } = e.target.getLatLng();
                await reverseGeocode(lat, lng);
            };

            markerRef.current.on('dragend', onMarkerMove);

            leafletMap.current.on('click', async (e) => {
                const { lat, lng } = e.latlng;
                markerRef.current.setLatLng([lat, lng]);
                await reverseGeocode(lat, lng);
            });

            if (currentAddress) searchByAddress(currentAddress, true);

            return () => {
                clearTimeout(timer);
                if (leafletMap.current) { leafletMap.current.remove(); leafletMap.current = null; }
            };
        }, []);

        const reverseGeocode = async (lat, lng) => {
            if (!mountedRef.current) return;
            setLoading(true);
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=es&email=soporte@tudominio.com`, {
                    headers: { 'Accept-Language': 'es' }
                });
                const data = await res.json();
                if (!mountedRef.current) return;
                
                setPickedLat(lat);
                setPickedLng(lng);
                
                const addr = data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                const a = data.address || {};
                const clean = [
                    a.road && (a.house_number ? `${a.road} ${a.house_number}` : a.road),
                    a.city || a.town || a.village || a.county,
                    a.state
                ].filter(Boolean).join(', ') || addr;
                setPickedAddress(clean);
                setSearchInput(clean);
            } catch {
                if (mountedRef.current) {
                    setPickedLat(lat); setPickedLng(lng);
                    setPickedAddress(`${lat.toFixed(5)}, ${lng.toFixed(5)}`);
                }
            } finally { if (mountedRef.current) setLoading(false); }
        };

        const searchByAddress = async (query, moveMap = true) => {
            if (!query.trim() || !mountedRef.current) return;
            setLoading(true);
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&accept-language=es&email=soporte@tudominio.com`);
                const data = await res.json();
                if (!mountedRef.current) return;
                if (data.length > 0) {
                    const { lat, lon } = data[0];
                    const latN = parseFloat(lat); const lngN = parseFloat(lon);
                    if (markerRef.current) markerRef.current.setLatLng([latN, lngN]);
                    if (moveMap && leafletMap.current) leafletMap.current.setView([latN, lngN], 16);
                    await reverseGeocode(latN, lngN);
                } else {
                    if (mountedRef.current) setPickedAddress(query);
                }
            } catch { if (mountedRef.current) setPickedAddress(query); }
            finally { if (mountedRef.current) setLoading(false); }
        };

        const handleGPS = () => {
            if (!navigator.geolocation) {
                setToast({type: 'error', message: 'Tu navegador no soporta geolocalización.'});
                return;
            }
            setLoading(true);
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    if (leafletMap.current && markerRef.current) {
                        leafletMap.current.setView([lat, lng], 17);
                        markerRef.current.setLatLng([lat, lng]);
                        await reverseGeocode(lat, lng);
                    }
                },
                () => {
                    setLoading(false);
                    setToast({type: 'error', message: 'No se pudo obtener tu ubicación. Verifica permisos.'});
                },
                { enableHighAccuracy: true }
            );
        };

        return (
            <div className="fixed inset-0 z-[70] flex items-center justify-center bg-neutral-900/60 backdrop-blur-sm fade-in p-4" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                <div className="bg-white rounded-4xl shadow-2xl max-w-lg w-full border border-neutral-100 overflow-hidden relative flex flex-col" style={{maxHeight:'90vh'}}>
                    <div className="p-5 border-b border-neutral-100">
                        <button type="button" onClick={onClose} className="absolute top-4 right-5 text-neutral-400 hover:text-neutral-900 text-3xl font-light leading-none">×</button>
                        <h2 className="text-lg font-bold mb-3 pr-8">📍 Seleccionar dirección</h2>
                        <div className="flex gap-2">
                            <input
                                type="text"
                                value={searchInput}
                                onChange={e => setSearchInput(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && !loading && searchByAddress(searchInput)}
                                placeholder="Buscar dirección..."
                                className="flex-1 p-3 bg-neutral-50 border border-neutral-200 rounded-2xl text-sm outline-none focus:border-brand-600"
                            />
                            <button
                                type="button"
                                onClick={() => searchByAddress(searchInput)}
                                disabled={loading}
                                className="bg-brand-600 text-white px-4 py-3 rounded-2xl text-sm font-semibold active:scale-95 transition disabled:bg-brand-300"
                            >
                                {loading ? '...' : 'Buscar'}
                            </button>
                            <button
                                type="button"
                                onClick={handleGPS}
                                disabled={loading}
                                title="Usar mi ubicación actual"
                                className="bg-neutral-900 text-white px-4 py-3 rounded-2xl text-sm font-semibold active:scale-95 transition disabled:bg-neutral-600"
                            >
                                GPS
                            </button>
                        </div>
                        <p className="text-xs text-neutral-400 mt-2">Mové el pin azul o usa el GPS para mayor precisión.</p>
                    </div>

                    <div ref={mapRef} style={{height:'320px', width:'100%', zIndex: 1}}></div>

                    <div className="p-5 border-t border-neutral-100">
                        {loading ? (
                            <div className="flex items-center gap-2 text-sm text-neutral-400 mb-3">
                                <div className="w-4 h-4 border-2 border-neutral-300 border-t-transparent rounded-full animate-spin"></div>
                                Buscando dirección...
                            </div>
                        ) : pickedAddress ? (
                            <p className="text-sm text-neutral-700 font-medium mb-3 bg-neutral-50 border border-neutral-200 rounded-2xl px-3 py-2.5">📍 {pickedAddress}</p>
                        ) : (
                            <p className="text-sm text-neutral-400 mb-3">Seleccioná un punto en el mapa</p>
                        )}
                        <div className="flex gap-2">
                            <button type="button" onClick={onClose} className="flex-1 py-3 rounded-2xl border border-neutral-200 text-neutral-600 text-sm font-medium active:scale-95 transition">Cancelar</button>
                            <button
                                type="button"
                                onClick={() => { if (pickedAddress) { onConfirm(pickedAddress, pickedLat, pickedLng); onClose(); } }}
                                disabled={!pickedAddress || loading}
                                className={`flex-1 py-3 rounded-2xl text-white text-sm font-semibold active:scale-95 transition ${!pickedAddress || loading ? 'bg-brand-300 cursor-not-allowed' : 'bg-brand-600 hover:bg-brand-700'}`}
                            >
                                Confirmar dirección
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    // ===================== BLOCKED DATES PANEL =====================
    function BlockedDatesPanel({ profId, profile, setToast }) {
        const [newDate, setNewDate] = useState('');
        const [saving, setSaving]  = useState(false);
        const blocked = profile?.config?.blockedDates || [];
        const today = getTodayStr();

        const addDate = async () => {
            if (!newDate || newDate < today) { setToast({type:'error', message:'Elegí una fecha válida (hoy o futura)'}); return; }
            if (blocked.includes(newDate)) { setToast({type:'error', message:'Esa fecha ya está bloqueada'}); return; }
            setSaving(true);
            try {
                const updated = [...blocked.filter(d => d >= today), newDate].sort();
                await db.collection("professionals").doc(profId).update({ 'config.blockedDates': updated });
                setNewDate('');
                setToast({type:'success', message:'Fecha bloqueada'});
            } catch { setToast({type:'error', message:'No se pudo guardar'}); } finally { setSaving(false); }
        };

        const removeDate = async (date) => {
            setSaving(true);
            try {
                const updated = blocked.filter(d => d !== date && d >= today);
                await db.collection("professionals").doc(profId).update({ 'config.blockedDates': updated });
                setToast({type:'success', message:'Fecha desbloqueada'});
            } catch { setToast({type:'error', message:'No se pudo guardar'}); } finally { setSaving(false); }
        };

        return (
            <div className="bg-white p-8 rounded-4xl shadow-sm border border-neutral-100">
                <h2 className="text-xl font-semibold mb-1 flex items-center gap-2">🚫 Días Bloqueados</h2>
                <p className="text-sm text-neutral-500 mb-5">Marcá feriados, vacaciones o cualquier fecha en que no atendés. Los clientes no podrán reservar esos días.</p>
                <div className="flex flex-col sm:flex-row gap-2 mb-5">
                    <input type="date" min={today} value={newDate} onChange={e => setNewDate(e.target.value)}
                        className="flex-1 p-3 bg-neutral-50 border border-neutral-200 rounded-2xl text-sm outline-none focus:border-brand-600" />
                    <button type="button" onClick={addDate} disabled={saving || !newDate} className="bg-brand-600 text-white px-6 py-3 rounded-2xl text-sm font-semibold active:scale-95 transition disabled:bg-brand-300 w-full sm:w-auto">
                        Bloquear
                    </button>
                </div>
                {blocked.filter(d => d >= today).length === 0 ? (
                    <p className="text-sm text-neutral-400 text-center py-4 bg-neutral-50 rounded-2xl border border-neutral-100">No hay fechas bloqueadas.</p>
                ) : (
                    <div className="space-y-2">
                        {blocked.filter(d => d >= today).map(d => (
                            <div key={d} className="flex items-center justify-between bg-red-50 border border-red-200 rounded-2xl px-4 py-3">
                                <span className="font-semibold text-red-700 text-sm">🚫 {formatDate(d)}</span>
                                <button type="button" onClick={() => removeDate(d)} disabled={saving} className="text-red-400 hover:text-red-700 transition text-xs font-bold px-2 py-1">Quitar</button>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    }

        const [savingAtt, setSavingAtt] = useState(false);

            if (savingAtt) return;
            const newVal = a.attended === val ? undefined : val;
            setSavingAtt(true);
            try {
                await db.collection("appointments").doc(a.id).update({
                    attended: newVal === undefined ? firebase.firestore.FieldValue.delete() : newVal
                });

            finally { setSavingAtt(false); }
        };

            <div className={`bg-white p-6 rounded-3xl shadow-sm border transition-all ${
                a.attended === true  ? 'border-emerald-200 bg-emerald-50/40' :
                a.attended === false ? 'border-red-200 bg-red-50/40' :

                <div className="font-bold text-neutral-950 uppercase text-lg">{a.client}</div>

                    >❌ No vino</button>
                    <a href={`https://wa.me/${a.phone}?text=${encodeURIComponent(buildWAMsg(profile.waTemplate, a, profile.business))}`} target="_blank" className="text-emerald-700 bg-emerald-50 border border-emerald-200 px-3 py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-1 active:scale-95 transition">
                        <IconWhatsapp />
                    </a>
                    <button type="button" onClick={() => setDialog({ type:'confirm', title:'Eliminar turno', message:`¿Eliminás el turno de ${a.client} del ${formatDate(a.date)}? Esta acción no se puede deshacer.`, onConfirm: async () => { try { await db.collection("appointments").doc(a.id).delete(); setToast({type:'success', message:'Turno eliminado'}); } catch(err) { setToast({type:'error', message:'No se pudo eliminar el turno.'}); } } })} className="text-red-500 bg-red-50 border border-red-100 px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-1 active:scale-95 transition">

    // ===================== ADMIN (PROFESSIONAL) =====================
    function AdminView({ user, setDialog, setToast, globalSettings }) {
        const [profile, setProfile]       = useState(null);
        const [apts, setApts]             = useState([]);
        const [pastApts, setPastApts]     = useState([]);
        const [olderApts, setOlderApts]   = useState([]); 
        const [loadingOlder, setLoadingOlder] = useState(false); 
        const [olderLoaded, setOlderLoaded] = useState(false); 
        const [waitlist, setWaitlist]     = useState([]);
        const [loading, setLoading]       = useState(true);
        const [activeTab, setActiveTab]   = useState('appointments');
        const [profPhonePrefix, setProfPhonePrefix] = useState('54');
        const [profPhoneLocal,  setProfPhoneLocal]  = useState('');
        const [logoPreview, setLogoPreview] = useState('');
        const [aptSearch, setAptSearch]   = useState('');
        const [notesModal, setNotesModal] = useState(null);
        const [showMapPicker, setShowMapPicker] = useState(false);
        const [addressInput, setAddressInput] = useState('');
        const [addressLat, setAddressLat] = useState(null);
        const [addressLng, setAddressLng] = useState(null);
        const [showRenewModal, setShowRenewModal] = useState(false);
        const [showAddModal, setShowAddModal] = useState(false);
        const [saving, setSaving] = useState(false);
        const [audioBlocked, setAudioBlocked] = useState(false); // NUEVO ESTADO PARA EL CARTEL DE AUDIO
        const [broadcastDismissed, setBroadcastDismissed] = useState(false);
        const lastBroadcastRef = useRef('');

        useEffect(() => {
            const msg = globalSettings?.broadcastMessage || '';
            if (msg && msg !== lastBroadcastRef.current) {
                lastBroadcastRef.current = msg;
                setBroadcastDismissed(false);
            }
        }, [globalSettings?.broadcastMessage]);

        const prevAptsRef  = useRef(new Map()); 
        const initialized = useRef(false);
        const allAptsRef  = useRef([]);
        const profileConfigRef = useRef(null);

        // NUEVO: Detector de bloqueo de audio
        useEffect(() => {
            const ctx = getAudioCtx();
            if (ctx && ctx.state === 'suspended') {
                setAudioBlocked(true);
            }
            
            // Truco: si el usuario hace clic en CUALQUIER lugar de la pantalla, destrabamos el audio de fondo y ocultamos el cartel
            const handleAnyClick = () => {
                const currentCtx = getAudioCtx();
                if (currentCtx && currentCtx.state === 'suspended') {
                    currentCtx.resume().then(() => setAudioBlocked(false)).catch(()=>{});
                } else if (currentCtx && currentCtx.state === 'running') {
                    setAudioBlocked(false);
                }
            };
            document.addEventListener('click', handleAnyClick);
            return () => document.removeEventListener('click', handleAnyClick);
        }, []);


        useEffect(() => {
            profileConfigRef.current = profile?.config;
        }, [profile]);

        useEffect(() => {
            if (!user || user.isAnonymous) { setLoading(false); setProfile(null); return; }
            let active = true; let unsubApts = null; let unsubWaitlist = null;
            let logoInitialized = false;
            
            const unsubProf = db.collection("professionals").doc(user.uid).onSnapshot(
                (d) => { if (!active) return; if (d.exists) { setProfile(d.data()); if (!logoInitialized) { setLogoPreview(d.data().logoBase64 || ''); logoInitialized = true; } } else setProfile(null); setLoading(false); },
                (err) => { console.warn('onSnapshot prof error:', err); if (!active) return; setLoading(false); }
            );

            unsubWaitlist = db.collection("waitlists").where("profId", "==", user.uid).onSnapshot(snap => {
                if(!active) return;
                const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                setWaitlist(list);
            });

            const subscribeApts = () => {
                if (!active) return;
                
                // Ahora solo escuchamos turnos de HOY en adelante. Ahorro masivo de cuota.
                const minDate = getTodayStr();

                unsubApts = db.collection("appointments")
                    .where("profId","==",user.uid)
                    .where("date", ">=", minDate)
                    .onSnapshot(
                    (snap) => {
                        if (!active) return;
                        const today = getTodayStr();
                        const now = new Date();
                        const nowMins = now.getHours() * 60 + now.getMinutes();
                        const isPast = (a) => {
                            if (a.date < today) return true;
                            if (a.date === today) {
                                const [h, m] = a.time.split(':').map(Number);
                                return (h * 60 + m) <= nowMins;
                            }
                            return false;
                        };
                        const all = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        allAptsRef.current = all;
                        
                        const newList = all.filter(a => !isPast(a) || (a.cancelled && a.date >= minDate)).sort((a,b) => {
                            if (a.cancelled !== b.cancelled) return a.cancelled ? 1 : -1;
                            return a.date.localeCompare(b.date) || a.time.localeCompare(b.time);
                        });
                        const pastList = all.filter(a => isPast(a) && !a.cancelled).sort((a,b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time));
                        
                        setApts(newList); setPastApts(pastList);
                        
                        if (initialized.current) {
                            let playSound = false;
                            const notifsEnabled = profileConfigRef.current?.notificationsEnabled !== false; 
                            const prevMap = prevAptsRef.current;
                            
                                                        all.forEach(apt => {
                                const prev = prevMap.get(apt.id);
                                if (notifsEnabled) {
                                    if (!prev && !apt.cancelled && !apt.addedManually) {
                                        const msg = `${apt.client} agendó para el ${formatDate(apt.date)} a las ${apt.time}hs.`;
                                        showNotification('¡Nuevo turno reservado!', msg); // Notificación del sistema operativo
                                        setToast({ type: 'success', message: `¡NUEVO TURNO! ${msg}` }); // Cartel flotante dentro de la app
                                        playSound = true;
                                    }
                                    else if (prev && !prev.cancelled && apt.cancelled && (apt.cancelledBy === 'client' || apt.cancelledBy === 'client_reschedule')) {
                                        const msg = `${apt.client} canceló su turno del ${formatDate(apt.date)} a las ${apt.time}hs.`;
                                        showNotification('Turno cancelado', msg); // Notificación del sistema operativo
                                        setToast({ type: 'error', message: `¡TURNO CANCELADO! ${msg}` }); // Cartel flotante dentro de la app (en rojo)
                                        playSound = true;
                                    }
                                }
                            });
                            if (playSound) playNotificationSound();
                        }
                        
                        const newMap = new Map();
                        all.forEach(a => newMap.set(a.id, { cancelled: a.cancelled, addedManually: a.addedManually }));
                        prevAptsRef.current = newMap;
                        initialized.current = true;
                    },
                    (err) => { console.warn('onSnapshot apts error:', err); }
                );
            };
            subscribeApts();

            let lastMinute = new Date().getMinutes();
            const minuteTimer = setInterval(() => {
                const now = new Date();
                if (now.getMinutes() === lastMinute) return; // Si no cambió el minuto, no hacemos nada
                lastMinute = now.getMinutes();
                if (!active || allAptsRef.current.length === 0) return;
                const today = getTodayStr();
                const nowMins = now.getHours() * 60 + now.getMinutes();
                const isPastNow = (a) => {
                    if (a.date < today) return true;
                    if (a.date === today) { const [h,m] = a.time.split(':').map(Number); return (h*60+m) <= nowMins; }
                    return false;
                };
                const all = allAptsRef.current;
                
                setApts(all.filter(a => !isPastNow(a) || a.cancelled).sort((a,b) => {
                    if (a.cancelled !== b.cancelled) return a.cancelled ? 1 : -1;
                    return a.date.localeCompare(b.date) || a.time.localeCompare(b.time);
                }));
                setPastApts(all.filter(a => isPastNow(a) && !a.cancelled).sort((a,b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time)));
            }, 30000); // Chequeamos cada 30 seg pero solo actualizamos al cambiar el minuto
            return () => { active = false; clearInterval(minuteTimer); try { unsubProf(); } catch(e){} if (unsubApts) unsubApts(); if (unsubWaitlist) unsubWaitlist(); };
        }, [user]);

        const phoneSynced = useRef(false);
        useEffect(() => {
            if (profile?.phone && !phoneSynced.current) {
                phoneSynced.current = true;
                const sorted = [...COUNTRY_CODES].sort((a,b) => b.code.length - a.code.length);
                const guessPrefix = sorted.find(c => profile.phone.startsWith(c.code))?.code || '54';

            const file = e.target.files[0]; if (!file) return;

            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);
                
                const MAX = 250; 
                let { width, height } = img;
                if (width > height) { if (width > MAX) { height = Math.round(height * MAX / width); width = MAX; } }
                else { if (height > MAX) { width = Math.round(width * MAX / height); height = MAX; } }
                
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, width, height);
                
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                
                ctx.drawImage(img, 0, 0, width, height);
                
                let final = canvas.toDataURL('image/webp', 0.8);
                
                if (final.startsWith('data:image/png') || final.length > 80000) {
                    final = canvas.toDataURL('image/jpeg', 0.8);
                }
                
                setLogoPreview(final);
                setToast({type:'success', message:`Logo subido en alta calidad (~${Math.round((final.length*3)/4/1024)}KB)`});
            };
            img.onerror = () => { URL.revokeObjectURL(url); setToast({type:'error', message:'No se pudo leer la imagen.'}); };
