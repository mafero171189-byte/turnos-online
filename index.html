<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
        apiKey: "AIzaSyAz0trpUxBYqZ_Ws0TnKjXQLpsSlgf6wqQ",
        authDomain: "turno-facil-53956.firebaseapp.com",

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Íconos SVG
    const IconUser     = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>;
    const IconBriefcase= () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>;

    const IconMail     = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>;

    const IconLogout   = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>;
    const IconSettings = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>;
    const IconCalendar = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>;
    const IconHistory  = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>;
    const IconWhatsapp = () => <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>;
    const IconBlock    = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>;
    const IconBell     = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>;
    const IconSearch   = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>;
    const IconTrash    = () => <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;

    // Códigos de país para WhatsApp
    const COUNTRY_CODES = [
        { code:'54',  flag:'🇦🇷', label:'AR' },
        { code:'598', flag:'🇺🇾', label:'UY' },
        { code:'56',  flag:'🇨🇱', label:'CL' },
        { code:'55',  flag:'🇧🇷', label:'BR' },
        { code:'595', flag:'🇵🇾', label:'PY' },
        { code:'591', flag:'🇧🇴', label:'BO' },
        { code:'57',  flag:'🇨🇴', label:'CO' },
        { code:'51',  flag:'🇵🇪', label:'PE' },
        { code:'34',  flag:'🇪🇸', label:'ES' },
        { code:'1',   flag:'🇺🇸', label:'US' },
    ];
    // Combina prefijo + número local → dígitos puros (ej: "5491122334455")
    const buildPhone = (prefix, local) => prefix + local.replace(/\D/g,'');

    // Input de WhatsApp con selector de prefijo
    const PhoneInput = ({ namePrefix='phonePrefix', nameLocal='phoneLocal',
                          prefix, onPrefixChange, value, onChange,
                          placeholder='1122334455', required=false, size='md' }) => {
        const pad = size === 'sm' ? 'px-2 py-2 text-xs' : 'px-3 py-4 text-sm';
        const inp = size === 'sm' ? 'p-2 text-sm' : 'p-4 text-sm';
        return (
            <div class="flex">
                <select name={namePrefix} value={prefix} onChange={e => onPrefixChange(e.target.value)}
                    class={`bg-neutral-50 border border-neutral-200 border-r-0 rounded-l-2xl ${pad} outline-none focus:border-brand-600 font-medium text-neutral-600`}>
                    {COUNTRY_CODES.map(c => (
                        <option key={c.code} value={c.code}>{c.flag} +{c.code}</option>
                    ))}
                </select>
                <input name={nameLocal} type="tel" value={value} onChange={onChange}
                    placeholder={placeholder}
                    class={`flex-1 ${inp} bg-neutral-50 border border-neutral-200 rounded-r-2xl outline-none focus:border-brand-600`}
                    required={required} />
            </div>
        );
    };

    // Helpers
    const generateTimeSlots = (start, end, durationMins) => {
        const slots = [];
        let [sh, sm] = start.split(':').map(Number);
        const [eh, em] = end.split(':').map(Number);
        let cur = sh * 60 + sm;
        const endM = eh * 60 + em;
        while (cur + durationMins <= endM) {
            slots.push(`${String(Math.floor(cur/60)).padStart(2,'0')}:${String(cur%60).padStart(2,'0')}`);
            cur += durationMins;
        }
        return slots;
    };
    const parseDateLocal = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
    const formatDate = (s) => s ? s.split('-').reverse().join('/') : '';
    const getTodayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

    const DAYS = [
        {id:1,name:'Lun'},{id:2,name:'Mar'},{id:3,name:'Mie'},
        {id:4,name:'Jue'},{id:5,name:'Vie'},{id:6,name:'Sab'},{id:0,name:'Dom'}
    ];

    const DEFAULT_WA_TEMPLATE = 'Hola {cliente}! Te confirmamos tu turno para el {fecha} a las {hora}hs en {negocio}. Te esperamos!';

    const buildWAMsg = (template, apt, businessName) =>
        (template || DEFAULT_WA_TEMPLATE)
            .replace('{cliente}', apt.client)
            .replace('{fecha}', formatDate(apt.date))
            .replace('{hora}', apt.time)
            .replace('{negocio}', businessName);

    const requestNotificationPermission = async () => {
        if (!('Notification' in window)) return false;
        if (Notification.permission === 'granted') return true;
        const perm = await Notification.requestPermission();
        return perm === 'granted';
    };
    const showNotification = (title, body) => {
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(title, { body });
        }
    };

    const Spinner = () => (
        <div class="flex h-screen items-center justify-center bg-brand-50">
            <div class="w-10 h-10 border-4 border-brand-600 border-t-transparent rounded-full animate-spin"></div>
        </div>
    );

    // Componente Modal Personalizado (Reemplaza alert y confirm)
    const CustomDialog = ({ dialog, onClose }) => {
        if (!dialog) return null;
        return (
            <div class="fixed inset-0 z-50 flex items-center justify-center bg-neutral-900/40 backdrop-blur-sm fade-in p-4">
                <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-neutral-100">
                    <h3 class="text-xl font-bold mb-2 text-neutral-900">{dialog.title}</h3>
                    <p class="text-neutral-600 mb-6 text-sm leading-relaxed">{dialog.message}</p>
                    <div class="flex justify-end gap-3">
                        {dialog.type === 'confirm' && (
                            <button onClick={onClose} class="px-5 py-2.5 text-neutral-500 font-medium hover:bg-neutral-100 rounded-xl transition text-sm">
                                Cancelar
                            </button>
                        )}
                        <button onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); onClose(); }} 
                                class="px-5 py-2.5 bg-brand-600 text-white font-medium rounded-xl hover:bg-brand-700 transition active:scale-95 text-sm">
                            {dialog.type === 'confirm' ? 'Aceptar' : 'Entendido'}
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    function App() {
        const [user, setUser] = useState(null);
        const [view, setView] = useState('loading');
        const [profId, setProfId] = useState(null);
        const [dialog, setDialog] = useState(null); // Estado global para modales

        useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p');
            const unsub = auth.onAuthStateChanged((u) => {
                setUser(u);
                if (p) { setProfId(p); setView('client'); if (!u) auth.signInAnonymously().catch(console.error); }
                else { setView('admin'); }
            });
            return () => unsub();
        }, []);

        if (view === 'loading') return <Spinner />;
        
        return (
            <>
                {view === 'client' ? <ClientView profId={profId} setDialog={setDialog} /> : <AdminView user={user} setDialog={setDialog} />}
                <CustomDialog dialog={dialog} onClose={() => setDialog(null)} />
            </>
        );
    }

    function AuthScreen({ setDialog }) {
        const [mode, setMode] = useState('login'); // 'login' | 'register' | 'forgot'
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState('');
        const [success, setSuccess] = useState('');
        const [phonePrefix, setPhonePrefix] = useState('54');
        const [phoneLocal, setPhoneLocal] = useState('');

        const handleSubmit = async (e) => {
            e.preventDefault(); setError(''); setSuccess(''); setLoading(true);
            try {
                if (mode === 'forgot') {
                    await auth.sendPasswordResetEmail(e.target.email.value);
                    setSuccess('¡Listo! Revisá tu correo para restablecer la contraseña.');
                    setLoading(false); return;
                }
                if (mode === 'login') {
                    const persistence = e.target.remember?.checked
                        ? firebase.auth.Auth.Persistence.LOCAL
                        : firebase.auth.Auth.Persistence.SESSION;
                    await auth.setPersistence(persistence);
                    await auth.signInWithEmailAndPassword(e.target.email.value, e.target.password.value);
                } else {
                    const fullPhone = buildPhone(phonePrefix, phoneLocal);
                    if (fullPhone.length < 10 || fullPhone.length > 17) {
                        setError('Teléfono inválido. Ingresá el número sin el 0 ni el 15.'); setLoading(false); return;
                    }
                    const res = await auth.createUserWithEmailAndPassword(e.target.email.value, e.target.password.value);
                    await db.collection("professionals").doc(res.user.uid).set({
                        name: e.target.name.value, business: e.target.business.value,
                        service: e.target.service.value, phone: fullPhone, email: e.target.email.value,
                        waTemplate: DEFAULT_WA_TEMPLATE,
                        config: { workingDays:[1,2,3,4,5], startTime:'09:00', endTime:'18:00', duration:30, blockedDates:[] }
                    });
                }
            } catch (err) {
                const msgs = {
                    'auth/user-not-found': 'No existe una cuenta con ese correo.',
                    'auth/wrong-password': 'Contraseña incorrecta.',
                    'auth/email-already-in-use': 'Ese correo ya está registrado.',
                    'auth/invalid-email': 'El correo no es válido.',
                    'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
                    'auth/too-many-requests': 'Demasiados intentos. Esperá unos minutos.',
                };
                setError(msgs[err.code] || 'Ocurrió un error. Intentá de nuevo.');
            } finally { setLoading(false); }
        };

        return (
            <div class="min-h-screen flex items-center justify-center p-4 fade-in">
                <div class="w-full max-w-md">
                    <div class="text-center mb-10">
                        <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-4xl shadow-xl shadow-brand-100 mb-4 border border-brand-100"><span class="text-4xl">&#128197;</span></div>
                        <h1 class="text-3xl font-bold text-neutral-950 tracking-tighter">Turno Facil<span class="text-brand-600">Pro</span></h1>
                    </div>
                    <div class="bg-white p-8 rounded-4xl shadow-2xl shadow-brand-100/50 border border-neutral-100">
                        <h2 class="text-xl font-semibold mb-1">
                            {mode === 'login' ? '¡Hola de nuevo!' : mode === 'register' ? 'Creá tu cuenta' : 'Recuperar contraseña'}
                        </h2>
                        <p class="text-neutral-500 mb-6 text-sm">
                            {mode === 'login' ? 'Ingresá para ver tus turnos.' : mode === 'register' ? 'Configurá tu panel profesional.' : 'Te enviamos un link a tu correo.'}
                        </p>
                        {error  && <div class="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4 border border-red-100">{error}</div>}
                        {success && <div class="bg-emerald-50 text-emerald-700 p-3 rounded-xl text-sm mb-4 border border-emerald-100">{success}</div>}
                        <form onSubmit={handleSubmit} class="space-y-4">
                            {mode === 'register' && (<>
                                <div class="relative"><div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconUser /></div>
                                    <input name="name" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="Tu nombre" required /></div>
                                <div class="relative"><div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconBriefcase /></div>
                                    <input name="business" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="Nombre de tu negocio" required /></div>
                                <div class="relative"><div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconSettings /></div>
                                    <input name="service" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="¿A qué te dedicás?" required /></div>
                                <div>
                                    <label class="block text-xs font-semibold text-neutral-500 mb-1.5 ml-1">WhatsApp profesional</label>
                                    <PhoneInput prefix={phonePrefix} onPrefixChange={setPhonePrefix} value={phoneLocal} onChange={e => setPhoneLocal(e.target.value)} placeholder="1122334455" required />
                                    <p class="text-xs text-neutral-400 mt-1 ml-1">Sin el 0 ni el 15. Ej: 1122334455</p>
                                </div>
                            </>)}
                            <div class="relative"><div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconMail /></div>
                                <input name="email" type="email" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="Correo electrónico" required /></div>
                            {mode !== 'forgot' && (
                                <div class="relative"><div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconLock /></div>
                                    <input name="password" type="password" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="Contraseña" required /></div>
                            )}
                            {mode === 'login' && (
                                <div class="flex items-center justify-between">
                                    <label class="flex items-center gap-2 cursor-pointer text-sm text-neutral-600">
                                        <input name="remember" type="checkbox" class="w-4 h-4 rounded accent-brand-600" />
                                        Recordar sesión
                                    </label>
                                    <button type="button" onClick={() => { setMode('forgot'); setError(''); setSuccess(''); }}
                                        class="text-brand-600 text-sm font-medium hover:underline">¿Olvidaste tu contraseña?</button>
                                </div>
                            )}
                            <button type="submit" disabled={loading} class={`w-full text-white py-4 rounded-2xl font-semibold shadow-lg transition ${loading ? 'bg-brand-400 cursor-not-allowed' : 'bg-brand-600 active:scale-[0.98]'}`}>
                                {loading ? 'Procesando...' : mode === 'login' ? 'Ingresar' : mode === 'register' ? 'Crear Cuenta' : 'Enviar link de recuperación'}
                            </button>
                        </form>
                        <div class="mt-6 text-center space-y-2">
                            {mode !== 'register' && (
                                <button onClick={() => { setMode('register'); setError(''); setSuccess(''); }} class="block w-full text-brand-600 text-sm font-medium">
                                    ¿No tenés cuenta? <span class="underline">Registrate acá</span>
                                </button>
                            )}
                            {mode !== 'login' && (
                                <button onClick={() => { setMode('login'); setError(''); setSuccess(''); }} class="block w-full text-neutral-500 text-sm">
                                    ← Volver al inicio de sesión
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    function AdminView({ user, setDialog }) {
        // ✅ Todos los hooks deben ir ANTES de cualquier return condicional (Reglas de React)
        const [profile, setProfile] = useState(null);
        const [apts, setApts] = useState([]);
        const [pastApts, setPastApts] = useState([]);
        const [loading, setLoading] = useState(true);
        const [activeTab, setActiveTab] = useState('appointments');
        const [newBlockDate, setNewBlockDate] = useState('');
        const prevAptIds = useRef(new Set());
        const initialized = useRef(false);

        useEffect(() => {
            if (user && !user.isAnonymous) requestNotificationPermission();
        }, [user]);

        useEffect(() => {
            // Si no hay usuario válido, no suscribirse a Firestore
            if (!user || user.isAnonymous) { setLoading(false); return; }

            const unsubProf = db.collection("professionals").doc(user.uid).onSnapshot(
                (d) => { if (d.exists) setProfile(d.data()); else setProfile(null); setLoading(false); },
                (err) => { console.error(err); setLoading(false); setProfile(null); }
            );
            const today = getTodayStr();
            // Usamos solo where("profId") para evitar índices compuestos en Firestore
            // y filtramos/ordenamos del lado del cliente para garantizar tiempo real
            const unsubApts = db.collection("appointments")
                .where("profId","==",user.uid)
                .onSnapshot((snap) => {
                    const all = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const newList = all
                        .filter(a => a.date >= today)
                        .sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
                    const pastList = all
                        .filter(a => a.date < today)
                        .sort((a,b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time));
                    if (initialized.current) {
                        newList.forEach(apt => {
                            if (!prevAptIds.current.has(apt.id)) {
                                showNotification('Nuevo turno reservado', `${apt.client} - ${formatDate(apt.date)} ${apt.time}hs`);
                            }
                        });
                        const removedIds = [...prevAptIds.current].filter(id => !newList.find(a => a.id === id));
                        if (removedIds.length > 0) showNotification('Turno cancelado', 'Un cliente canceló su turno.');
                    }
                    prevAptIds.current = new Set(newList.map(a => a.id));
                    initialized.current = true;
                    setApts(newList);
                    setPastApts(pastList);
                }, (err) => { console.error(err); setApts([]); });
            return () => { unsubProf(); unsubApts(); };
        }, [user]);

        // Returns condicionales DESPUÉS de todos los hooks
        if (!user || user.isAnonymous) return <AuthScreen setDialog={setDialog} />;
        if (loading) return <Spinner />;
        if (!profile) return <AuthScreen setDialog={setDialog} />;

        const shareUrl = window.location.origin + window.location.pathname + "?p=" + user.uid;
        const waTemplate = profile.waTemplate || DEFAULT_WA_TEMPLATE;

        const sendWhatsAppConfirm = (a) => {
            const msg = encodeURIComponent(buildWAMsg(waTemplate, a, profile.business));

        };

        const deleteApt = (a) => {
            setDialog({
                type: 'confirm',
                title: 'Eliminar Turno',
                message: `¿Estás seguro de eliminar el turno de ${a.client}?`,
                onConfirm: async () => {
                    setApts(prev => prev.filter(apt => apt.id !== a.id));
                    try {
                        await db.collection("appointments").doc(a.id).delete();
                    } catch (err) {
                        setApts(prev => [...prev, a].sort((x,y) => x.date.localeCompare(y.date) || x.time.localeCompare(y.time)));
                        setDialog({ type: 'alert', title: 'Error', message: 'No se pudo eliminar el turno. Intentá de nuevo.' });

        const updateProfile = async (e) => {

    function ClientView({ profId, setDialog }) {
        const [prof, setProf] = useState(null);
        const [sent, setSent] = useState(null);
        const [selectedDate, setSelectedDate] = useState('');
        const [selectedTime, setSelectedTime] = useState('');
        const [bookedTimes, setBookedTimes] = useState([]);
        const [booking, setBooking] = useState(false);
        const [clientView, setClientView] = useState('book');
        const [clientPhonePrefix, setClientPhonePrefix] = useState('54');
        const [clientPhoneLocal, setClientPhoneLocal] = useState('');

        useEffect(() => {
            db.collection("professionals").doc(profId).get().then(d => {
                if (d.exists) {
                    const data = d.data();
                    if (!data.config) data.config = { workingDays:[1,2,3,4,5], startTime:'09:00', endTime:'18:00', duration:30, blockedDates:[] };
                    if (!data.config.blockedDates) data.config.blockedDates = [];
                    setProf(data);
                    document.title = `Reservas - ${data.business}`;
                }
            });
        }, [profId]);

        useEffect(() => {
            if (selectedDate && profId) {
                db.collection("appointments").where("profId","==",profId).where("date","==",selectedDate).get()
                    .then(snap => setBookedTimes(snap.docs.map(d => d.data().time)));
                setSelectedTime('');
            }
        }, [selectedDate, profId]);

        const handleBooking = async (e) => {
            e.preventDefault();
            if (!selectedTime) {
                setDialog({ type: 'alert', title: 'Atención', message: 'Por favor, seleccioná una hora.' });
                return;
            }
            if (booking) return;
            const fullPhone = buildPhone(clientPhonePrefix, clientPhoneLocal);
            if (clientPhoneLocal.replace(/\D/g,'').length < 8 || fullPhone.length > 17) {
                setDialog({ type: 'alert', title: 'Datos incorrectos', message: 'Ingresá un WhatsApp válido sin el 0 ni el 15. Ej: 1122334455' });
                return;
            }
            setBooking(true);
            try {
                if (!auth.currentUser) await auth.signInAnonymously();
            } catch (authErr) {
                setDialog({ type: 'alert', title: 'Error de conexión', message: "Error de autenticación: " + authErr.message });
                setBooking(false); return;
            }
            const slotId = `${profId}_${selectedDate}_${selectedTime.replace(':','-')}`;
            const slotRef = db.collection("appointments").doc(slotId);
            try {
                await db.runTransaction(async (tx) => {
                    const slotDoc = await tx.get(slotRef);
                    if (slotDoc.exists) throw new Error("SLOT_TAKEN");
                    tx.set(slotRef, {
                        profId, date: selectedDate, time: selectedTime,
                        client: e.target.clientName.value, phone: fullPhone,
                        notes: e.target.notes.value.trim() || '',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                
                // Solo registramos la vista de éxito. Eliminado el popup automático a WhatsApp.
                setSent({ date: selectedDate, time: selectedTime, client: e.target.clientName.value });
            } catch (err) {
                if (err.message === "SLOT_TAKEN") {
                    setDialog({ type: 'alert', title: 'Turno ocupado', message: '¡Ese turno acaba de ser tomado! Elegí otro horario, por favor.' });
                    const snap = await db.collection("appointments").where("profId","==",profId).where("date","==",selectedDate).get();
                    setBookedTimes(snap.docs.map(d => d.data().time));
                    setSelectedTime('');
                } else {
                    setDialog({ type: 'alert', title: 'Error', message: "Ocurrió un problema: " + (err.code || err.message) });
                }
            } finally { setBooking(false); }
        };

        if (sent) return (
            <div class="h-screen flex items-center justify-center p-6 bg-brand-50 text-center fade-in">
                <div class="bg-white p-10 rounded-4xl shadow-xl max-w-sm border border-neutral-100 w-full">
                    <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl border border-emerald-100">&#10003;</div>
                    <h2 class="text-2xl font-bold tracking-tight">¡Turno Confirmado!</h2>
                    <div class="mt-4 bg-brand-50 rounded-2xl p-4 border border-brand-100">
                        <p class="text-brand-700 font-semibold text-lg">{formatDate(sent.date)}</p>
                        <p class="text-brand-600 font-bold text-2xl">{sent.time} hs</p>
                    </div>
                    <p class="text-neutral-500 mt-4 text-sm">Reserva en <span class="font-semibold text-neutral-700">{prof?.business}</span> registrada.</p>
                    <button onClick={() => { setSent(null); setSelectedDate(''); setSelectedTime(''); setClientView('cancel'); }}
                        class="mt-6 w-full text-brand-600 border border-brand-200 py-3 rounded-2xl text-sm font-medium hover:bg-brand-50 transition">
                        Ver mis turnos
                    </button>
                </div>
            </div>
        );

        if (!prof) return <div class="p-10 text-center bg-brand-50 h-screen text-neutral-500 flex items-center justify-center">Cargando...</div>;

        let availableSlots = [], isWorkingDay = true, isBlockedDate = false;
        if (selectedDate) {
            const dayOfWeek = parseDateLocal(selectedDate).getDay();
            isWorkingDay = prof.config.workingDays.includes(dayOfWeek);
            isBlockedDate = (prof.config.blockedDates||[]).includes(selectedDate);
            if (isWorkingDay && !isBlockedDate) {
                availableSlots = generateTimeSlots(prof.config.startTime, prof.config.endTime, prof.config.duration).filter(t => !bookedTimes.includes(t));
            }
        }
        const today = getTodayStr();

        return (
            <div class="max-w-md mx-auto p-6 pb-12 fade-in">
                <div class="text-center mb-8 mt-6">
                    <div class="w-24 h-24 bg-brand-600 text-white rounded-4xl mx-auto flex items-center justify-center text-5xl font-bold mb-5 shadow-xl border-4 border-white">
                        {prof.business.charAt(0).toUpperCase()}
                    </div>
                    <h1 class="text-2xl font-bold text-neutral-950 tracking-tighter">{prof.business}</h1>
                    <p class="text-brand-600 font-medium">{prof.service || 'Reserva tu cita online'}</p>
                </div>

                <div class="flex gap-2 mb-6 bg-white p-1.5 rounded-2xl border border-neutral-100 shadow-sm">
                    <button onClick={() => setClientView('book')} class={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-colors ${clientView==='book' ? 'bg-brand-600 text-white shadow-md' : 'text-neutral-500'}`}>
                        &#128197; Reservar turno
                    </button>
                    <button onClick={() => setClientView('cancel')} class={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-colors ${clientView==='cancel' ? 'bg-brand-600 text-white shadow-md' : 'text-neutral-500'}`}>
                        Mis turnos
                    </button>
                </div>

                {clientView === 'book' && (
                    <form onSubmit={handleBooking} class="bg-white p-6 sm:p-8 rounded-4xl shadow-xl shadow-brand-100/50 space-y-6 border border-neutral-100">
                        <div>
                            <label class="block text-xs font-bold text-neutral-500 uppercase mb-2 ml-1">Seleccioná el día</label>
                            <input type="date" min={today} value={selectedDate} onChange={e => setSelectedDate(e.target.value)} class="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm font-medium" required />
                        </div>
                        {selectedDate && (
                            <div class="fade-in">
                                <label class="block text-xs font-bold text-neutral-500 uppercase mb-2 ml-1">Horarios Disponibles</label>
                                {isBlockedDate ? <div class="p-4 bg-red-50 text-red-600 rounded-2xl text-sm border border-red-100 text-center">El profesional no atiende esta fecha.</div>
                                : !isWorkingDay ? <div class="p-4 bg-red-50 text-red-600 rounded-2xl text-sm border border-red-100 text-center">El profesional no atiende este día.</div>
                                : availableSlots.length === 0 ? <div class="p-4 bg-orange-50 text-orange-600 rounded-2xl text-sm border border-orange-100 text-center">No hay turnos libres para esta fecha.</div>
                                : <div class="grid grid-cols-3 gap-2 max-h-48 overflow-y-auto p-1">
                                    {availableSlots.map(time => (
                                        <button type="button" key={time} onClick={() => setSelectedTime(time)} class={`py-2 rounded-xl text-sm font-semibold transition-all ${selectedTime===time ? 'bg-brand-600 text-white shadow-md' : 'bg-neutral-50 text-neutral-700 hover:bg-brand-100 border border-neutral-200'}`}>{time}</button>
                                    ))}
                                </div>}
                            </div>
                        )}
                        <div class={`border-t border-neutral-100 pt-6 space-y-4 transition-all ${!selectedTime ? 'opacity-50 pointer-events-none' : ''}`}>
                            <div>
                                <label class="block text-xs font-bold text-neutral-500 uppercase mb-1.5 ml-1">Tus Datos</label>
                                <input name="clientName" placeholder="Nombre y apellido" class="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 mb-4" required />
                                <label class="block text-xs font-semibold text-neutral-500 mb-1.5 ml-1">Tu WhatsApp</label>
                                <PhoneInput
                                    namePrefix="clientPhonePrefix" nameLocal="clientPhoneLocal"
                                    prefix={clientPhonePrefix} onPrefixChange={setClientPhonePrefix}
                                    value={clientPhoneLocal} onChange={e => setClientPhoneLocal(e.target.value)}
                                    placeholder="1122334455" required
                                />
                                <p class="text-xs text-neutral-400 mt-1 ml-1">Sin el 0 ni el 15.</p>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-neutral-500 uppercase mb-1.5 ml-1">Motivo <span class="normal-case font-normal text-neutral-400">(opcional)</span></label>
                                <textarea name="notes" rows="2" placeholder="Ej: dejar equipo para revisar..." class="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm resize-none"></textarea>
                            </div>
                            <button type="submit" disabled={booking} class={`w-full text-white p-5 rounded-2xl font-semibold shadow-lg mt-2 transition text-lg ${booking ? 'bg-brand-400 cursor-not-allowed' : 'bg-brand-600 active:scale-[0.98]'}`}>
                                {booking ? 'Reservando...' : 'Confirmar Reserva'}
                            </button>
                        </div>
                    </form>
                )}

                {clientView === 'cancel' && <CancelView profId={profId} profPhone={prof.phone} setDialog={setDialog} onReschedule={() => { setClientView('book'); setSelectedDate(''); setSelectedTime(''); }} />}
            </div>
        );
    }

    function CancelView({ profId, profPhone, setDialog, onReschedule }) {
        const [searchPrefix, setSearchPrefix] = useState('54');
        const [searchLocal, setSearchLocal] = useState('');
        const [myApts, setMyApts] = useState(null);
        const [searching, setSearching] = useState(false);

        const searchApts = async () => {
            const localClean = searchLocal.replace(/\D/g,'');
            const fullPhone = buildPhone(searchPrefix, localClean);
            if (localClean.length < 8) {
                setDialog({ type: 'alert', title: 'Atención', message: 'Ingresá tu número sin el 0 ni el 15. Ej: 1122334455' });
                return;
            }
            setSearching(true);
            try {
                const today = getTodayStr();
                const snap = await db.collection("appointments")
                    .where("profId","==",profId)
                    .get();
                const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                // Intenta con número completo (nuevo formato) o solo local (compatibilidad)
                const list = all
                    .filter(a => (a.phone === fullPhone || a.phone === localClean) && a.date >= today)
                    .sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
                setMyApts(list);
            } catch (err) {
                console.error('Error buscando turnos:', err);
                setDialog({ type: 'alert', title: 'Error de búsqueda', message: 'No se pudieron cargar los turnos. Verificá tu conexión e intentá de nuevo.' });
            } finally {
                setSearching(false);
            }
        };

        const cancelApt = (apt) => {
            setDialog({
                type: 'confirm',
                title: 'Cancelar Turno',
                message: `¿Querés cancelar el turno del ${formatDate(apt.date)} a las ${apt.time}hs?`,
                onConfirm: async () => {
                    // Optimistic: eliminar de UI antes del request
                    setMyApts(prev => prev.filter(a => a.id !== apt.id));
                    try {
                        await db.collection("appointments").doc(apt.id).delete();
                    } catch (err) {
                        // Revertir si falla
                        setMyApts(prev => [...prev, apt].sort((a,b) => a.date.localeCompare(b.date)));
                        setDialog({ type: 'alert', title: 'Error', message: 'No se pudo cancelar el turno. Intentá de nuevo.' });
                    }
                }
            });
        };

        const rescheduleApt = (apt) => {
            setDialog({
                type: 'confirm',
                title: 'Reprogramar Turno',
                message: `Para reprogramar, primero cancelamos el turno del ${formatDate(apt.date)} a las ${apt.time}hs y luego podés elegir una nueva fecha. ¿Continuás?`,
                onConfirm: async () => {
                    // Optimistic: eliminar de UI antes del request
                    setMyApts(prev => prev.filter(a => a.id !== apt.id));
                    try {
                        await db.collection("appointments").doc(apt.id).delete();
                        if (onReschedule) onReschedule();
                    } catch (err) {
                        setMyApts(prev => [...prev, apt].sort((a,b) => a.date.localeCompare(b.date)));
                        setDialog({ type: 'alert', title: 'Error', message: 'No se pudo cancelar el turno. Intentá de nuevo.' });
                    }
                }
            });
        };

        const contactProf = (apt) => {
            const profNum = (profPhone || '').replace(/\D/g,'');
            if (!profNum) {
                setDialog({ type: 'alert', title: 'Sin WhatsApp', message: 'El profesional no tiene número de WhatsApp registrado.' });
                return;
            }
            const msg = encodeURIComponent(`Hola! Te escribo por mi turno del ${formatDate(apt.date)} a las ${apt.time}hs.\nNombre: ${apt.client}`);
            window.open(`https://wa.me/${profNum}?text=${msg}`, '_blank');
        };

        return (
            <div class="bg-white p-6 sm:p-8 rounded-4xl shadow-xl shadow-brand-100/50 space-y-6 border border-neutral-100 fade-in">
                <div>
                    <h3 class="text-lg font-bold mb-1">Mis turnos</h3>
                    <p class="text-sm text-neutral-500">Ingresá el WhatsApp con el que reservaste para ver tus turnos.</p>
                </div>
                <div class="space-y-2">
                    <PhoneInput
                        namePrefix="searchPrefix" nameLocal="searchLocal"
                        prefix={searchPrefix} onPrefixChange={setSearchPrefix}
                        value={searchLocal} onChange={e => setSearchLocal(e.target.value)}
                        placeholder="1122334455"
                    />
                    <p class="text-xs text-neutral-400 ml-1">Sin el 0 ni el 15.</p>
                    <button onClick={searchApts} disabled={searching}
                        class="w-full bg-brand-600 text-white py-3 rounded-2xl font-semibold active:scale-95 transition flex items-center justify-center gap-2 text-sm">
                        {searching
                            ? <><div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Buscando...</>
                            : <><IconSearch /> Buscar mis turnos</>}
                    </button>
                </div>

                {myApts !== null && (
                    <div class="fade-in">
                        {myApts.length === 0 ? (
                            <div class="text-center py-8 text-neutral-500 text-sm bg-neutral-50 rounded-2xl border border-neutral-100">
                                <span class="text-3xl block mb-2">&#128269;</span>
                                No encontramos turnos futuros para ese número.<br/>
                                <span class="text-xs text-neutral-400 mt-1 block">Asegurate de usar el mismo número y prefijo con el que reservaste.</span>
                            </div>
                        ) : (
                            <div class="space-y-3">
                                <p class="text-xs font-semibold text-neutral-500 uppercase">{myApts.length} turno{myApts.length !== 1 ? 's' : ''} encontrado{myApts.length !== 1 ? 's' : ''}</p>
                                {myApts.map(apt => (
                                    <div key={apt.id} class="bg-neutral-50 border border-neutral-200 rounded-2xl p-4 space-y-3 fade-in">
                                        <div>
                                            <div class="bg-brand-50 text-brand-700 font-bold px-3 py-1 rounded-xl text-sm border border-brand-100 inline-block mb-1">{formatDate(apt.date)} · {apt.time} hs</div>
                                            <div class="font-semibold text-neutral-800">{apt.client}</div>
                                            {apt.notes && <div class="text-xs text-neutral-400 mt-1">&#128172; {apt.notes}</div>}
                                        </div>
                                        <div class="flex gap-2 pt-1 border-t border-neutral-200">
                                            <button onClick={() => contactProf(apt)} class="flex-1 text-emerald-600 bg-emerald-50 border border-emerald-100 py-2 rounded-xl text-xs font-semibold flex items-center justify-center gap-1 active:scale-95 transition">
                                                <IconWhatsapp /> Escribir al profesional
                                            </button>
                                            <button onClick={() => rescheduleApt(apt)} class="flex-1 text-brand-600 bg-brand-50 border border-brand-100 py-2 rounded-xl text-xs font-semibold flex items-center justify-center gap-1 active:scale-95 transition">
                                                &#128197; Reprogramar
                                            </button>
                                            <button onClick={() => cancelApt(apt)} class="text-red-500 bg-red-50 border border-red-100 px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-1 active:scale-95 transition">
                                                <IconTrash />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
