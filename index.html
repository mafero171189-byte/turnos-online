    const generateTimeSlots = (start, end, durationMins) => {
        const slots = []; let [sh, sm] = start.split(':').map(Number); const [eh, em] = end.split(':').map(Number);
        let cur = sh * 60 + sm; const endM = eh * 60 + em;
        while (cur + durationMins <= endM) {
            slots.push(`${String(Math.floor(cur/60)).padStart(2,'0')}:${String(cur%60).padStart(2,'0')}`);
            cur += durationMins;
        }
        return slots;
    };
    const parseDateLocal = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
    const formatDate    = (s) => s ? s.split('-').reverse().join('/') : '';
    const getTodayStr   = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const getDaysLeft   = (expiresAt) => {
        if (!expiresAt) return 0;
        const ms = new Date(expiresAt).getTime();
        if (isNaN(ms)) return 0;
        const diff = ms - new Date().getTime();
        return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
    };

    const DAYS = [{id:1,name:'Lun'},{id:2,name:'Mar'},{id:3,name:'Mie'},{id:4,name:'Jue'},{id:5,name:'Vie'},{id:6,name:'Sab'},{id:0,name:'Dom'}];

    const buildWAMsg = (template, apt, businessName) =>
        (template || DEFAULT_WA_TEMPLATE)
            .replaceAll('{cliente}', apt.client)
            .replaceAll('{fecha}', formatDate(apt.date))
            .replaceAll('{hora}', apt.time)

    const requestNotificationPermission = async () => {
        if (!('Notification' in window)) return false;
        if (Notification.permission === 'granted') return true;
        return (await Notification.requestPermission()) === 'granted';
    };
    
    const showNotification = (title, body) => {
        try { if ('Notification' in window && Notification.permission === 'granted') new Notification(title, { body }); } 
        catch (err) { console.warn('Notificaciones bloqueadas.'); }
    };

    let _sharedAudioCtx = null;
    const getAudioCtx = () => {
        if (!_sharedAudioCtx || _sharedAudioCtx.state === 'closed') {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return null;
            _sharedAudioCtx = new AC();
        }
        return _sharedAudioCtx;
    };
    const playNotificationSound = () => {
        try {
            const ctx = getAudioCtx(); if (!ctx) return;
            const playTone = (freq, delay, duration) => {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, ctx.currentTime + delay);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
                osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + duration);
            };
            playTone(523.25, 0, 0.3); playTone(659.25, 0.15, 0.4);
        } catch (e) {}
    };

    const Spinner = () => (<div className="flex h-screen items-center justify-center bg-brand-50"><div className="w-10 h-10 border-4 border-brand-600 border-t-transparent rounded-full animate-spin"></div></div>);

    class ErrorBoundary extends React.Component {
        constructor(props) { super(props); this.state = { hasError: false, error: null }; }
        static getDerivedStateFromError(error) { return { hasError: true, error }; }
        componentDidCatch(error, info) { console.error('ErrorBoundary:', error, info); }
        render() {
            if (this.state.hasError) return (
                <div className="flex h-screen items-center justify-center bg-brand-50 p-6">
                    <div className="bg-white p-8 rounded-4xl shadow-xl max-w-sm w-full border border-neutral-100 text-center">

                    </div>
                </div>
            );
            return this.props.children;
        }
    }

    const CustomDialog = ({ dialog, onClose }) => {
        const [confirming, setConfirming] = useState(false);
        if (!dialog) return null;
        const handleConfirm = async () => {
            if (confirming) return;
            setConfirming(true);
            if (dialog.onConfirm) await dialog.onConfirm();
            setConfirming(false);
            onClose();
        };
        return (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-neutral-900/40 backdrop-blur-sm fade-in p-4">
                <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-neutral-100">
                    <h3 className="text-xl font-bold mb-2 text-neutral-900">{dialog.title}</h3>
                    <p className="text-neutral-600 mb-6 text-sm leading-relaxed">{dialog.message}</p>
                    <div className="flex justify-end gap-3">
                        {dialog.type === 'confirm' && (<button onClick={onClose} disabled={confirming} className="px-5 py-2.5 text-neutral-500 font-medium hover:bg-neutral-100 rounded-xl transition text-sm">Cancelar</button>)}
                        <button onClick={handleConfirm} disabled={confirming} className={`px-5 py-2.5 text-white font-medium rounded-xl transition text-sm ${confirming ? 'bg-brand-400 cursor-not-allowed' : 'bg-brand-600 hover:bg-brand-700 active:scale-95'}`}>{confirming ? 'Procesando...' : dialog.type === 'confirm' ? 'Aceptar' : 'Entendido'}</button>
                    </div>
                </div>
            </div>
        );
    };

    // ===================== APP =====================
    function App() {
        const [user, setUser]     = useState(null);
        const [view, setView]     = useState('loading');
        const [profId, setProfId] = useState(null);
        const [dialog, setDialog] = useState(null);
        const [toast, setToast]   = useState(null);

        useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p');
            const unsub = auth.onAuthStateChanged(async (u) => {
                setUser(u);
                if (p) { 
                    setProfId(p); setView('client'); if (!u) auth.signInAnonymously().catch(() => {}); 
                } else if (u && !u.isAnonymous) { 
                    try {
                        const adminDoc = await db.collection("admins").doc(u.uid).get();
                        if (adminDoc.exists) { setView('superadmin'); } else { setView('admin'); }
                    } catch (error) { setView('admin'); }
                } else { 
                    setView('admin'); 
                }
            });
            return () => unsub();
        }, []);

        if (view === 'loading') return <Spinner />;
        return (
            <>
                {view === 'client' ? <ClientView profId={profId} setDialog={setDialog} setToast={setToast} /> : 
                 view === 'superadmin' ? <SuperAdminView user={user} setDialog={setDialog} setToast={setToast} /> : 
                 <AdminView user={user} setDialog={setDialog} setToast={setToast} />}
                <CustomDialog dialog={dialog} onClose={() => setDialog(null)} />
                <Toast toast={toast} onClose={() => setToast(null)} />
            </>
        );
    }

    // ===================== AUTH =====================
    function AuthScreen({ setDialog, setToast }) {
        const [mode, setMode]             = useState('login');
        const [loading, setLoading]       = useState(false);
        const [phonePrefix, setPhonePrefix] = useState('54');
        const [phoneLocal, setPhoneLocal]   = useState('');
        const [showPassword, setShowPassword] = useState(false);

        const handleSubmit = async (e) => {
            e.preventDefault(); setLoading(true);
            try {
                if (mode === 'forgot') {
                    await auth.sendPasswordResetEmail(e.target.email.value);
                    setDialog({type:'alert', title:'Correo enviado', message:'Revisá tu correo para restablecer la contraseña.'});
                    setMode('login'); setLoading(false); return;
                }
                if (mode === 'login') {
                    const persistence = e.target.remember?.checked ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
                    await auth.setPersistence(persistence);
                    await auth.signInWithEmailAndPassword(e.target.email.value, e.target.password.value);
                    setToast({ type:'success', message: 'Sesión iniciada' });
                } else {
                    const fullPhone = buildPhone(phonePrefix, phoneLocal);
                    if (phoneLocal.replace(/\D/g,'').length < 8) { setToast({ type:'error', message:'Teléfono inválido.'}); setLoading(false); return; }
                    
                    const res = await auth.createUserWithEmailAndPassword(e.target.email.value, e.target.password.value);
                    const expirationDate = new Date();
                    expirationDate.setDate(expirationDate.getDate() + 30);
                    try {
                        await db.collection("professionals").doc(res.user.uid).set({
                            name: e.target.name.value, business: e.target.business.value,
                            service: e.target.service.value, phone: fullPhone, email: e.target.email.value,
                            waTemplate: DEFAULT_WA_TEMPLATE,
                            licenseExpiresAt: expirationDate.toISOString(),
                            subscriptionStatus: 'trial', 
                            isSuspended: false,
                            themeColor: '#4f46e5', logoBase64: '',
                            config: { workingDays:[1,2,3,4,5], startTime:'09:00', endTime:'18:00', duration:30, blockedDates:[] }
                        });
                        setToast({ type:'success', message: 'Cuenta creada con éxito' });
                    } catch(dbErr) {
                        // Si falla Firestore, borrar el usuario de Auth para no dejar un estado inconsistente
                        await res.user.delete().catch(() => {});
                        throw dbErr;
                    }
                }
            } catch (err) {
                const msgs = { 'auth/user-not-found':'Cuenta no encontrada.', 'auth/wrong-password':'Contraseña incorrecta.', 'auth/invalid-credential':'Email o contraseña incorrectos.', 'auth/email-already-in-use':'Correo ya registrado.', 'auth/weak-password':'La contraseña debe tener al menos 6 caracteres.', 'auth/invalid-email':'El formato del email no es válido.' };
                setToast({ type:'error', message: msgs[err.code] || 'Ocurrió un error.' });
            } finally { setLoading(false); }
        };

        return (
            <div className="min-h-screen flex items-center justify-center p-4 fade-in">
                <div className="w-full max-w-md">
                    <div className="text-center mb-10">
                        <div className="inline-flex items-center justify-center w-20 h-20 bg-white rounded-4xl shadow-xl shadow-brand-100 mb-4 border border-brand-100"><span className="text-4xl">&#128197;</span></div>
                        <h1 className="text-3xl font-bold text-neutral-950 tracking-tighter">Turno Fácil<span className="text-brand-600">Pro</span></h1>
                    </div>
                    <div className="bg-white p-8 rounded-4xl shadow-2xl shadow-brand-100/50 border border-neutral-100">
                        <h2 className="text-xl font-semibold mb-1">
                            {mode==='login' ? '¡Hola de nuevo!' : mode==='register' ? 'Registro gratis (30 días)' : 'Recuperar contraseña'}
                        </h2>
                        <p className="text-neutral-500 mb-6 text-sm">
                            {mode==='login' ? 'Ingresá para ver tus turnos.' : mode==='register' ? 'Creá tu cuenta y probá todas las funciones.' : 'Te enviamos un link a tu correo.'}
                        </p>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {mode === 'register' && (<>
                                <input name="name" className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="Tu nombre" required />
                                <input name="business" className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="Nombre de tu negocio" required />
                                <input name="service" className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="¿A qué te dedicás?" required />
                                <PhoneInput prefix={phonePrefix} onPrefixChange={setPhonePrefix} value={phoneLocal} onChange={e => setPhoneLocal(e.target.value)} required />
                            </>)}
                            
                            <input name="email" type="email" className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" placeholder="Correo electrónico" required />
                            
                            {mode !== 'forgot' && (
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400">
                                        <IconLock />
                                    </div>
                                    <input 
                                        name="password" 
                                        type={showPassword ? "text" : "password"} 
                                        className="w-full pl-12 pr-12 py-3 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 text-sm" 
                                        placeholder="Contraseña" 
                                        required 
                                    />
                                    <button 
                                        type="button" 
                                        onClick={() => setShowPassword(!showPassword)} 
                                        className="absolute inset-y-0 right-0 pr-4 flex items-center text-neutral-400 hover:text-brand-600 focus:outline-none"
                                    >
                                        {showPassword ? <IconEyeOff /> : <IconEye />}
                                    </button>
                                </div>
                            )}

                            {mode === 'login' && (
                                <div className="flex items-center justify-between">
                                    <label className="flex items-center gap-2 cursor-pointer text-sm text-neutral-600">
                                        <input name="remember" type="checkbox" defaultChecked={true} className="w-4 h-4 rounded accent-brand-600" />
                                        Recordar sesión
                                    </label>
                                </div>
                            )}

                            <button type="submit" disabled={loading} className={`w-full text-white py-4 rounded-2xl font-semibold shadow-lg transition ${loading ? 'bg-brand-400' : 'bg-brand-600 active:scale-[0.98]'}`}>
                                {loading ? 'Procesando...' : mode==='login' ? 'Ingresar' : mode==='register' ? 'Crear Cuenta' : 'Enviar link'}
                            </button>
                        </form>
                        
                        <div className="mt-6 text-center space-y-2">
                            {mode !== 'register' && <button onClick={() => { setMode('register'); setShowPassword(false); }} className="w-full text-brand-600 text-sm font-medium">¿No tenés cuenta? Registrate gratis</button>}
                            {mode === 'login' && <button onClick={() => { setMode('forgot'); setShowPassword(false); }} className="w-full text-neutral-500 text-sm">Olvidé mi contraseña</button>}
                            {mode !== 'login' && <button onClick={() => { setMode('login'); setShowPassword(false); }} className="w-full text-neutral-500 text-sm">Volver al inicio</button>}
                        </div>
                    </div>
                </div>
            </div>
        );
    }

        const [profPhoneLocal,  setProfPhoneLocal]  = useState('');
        const [logoPreview, setLogoPreview] = useState('');
        
        // ESTADO PARA MOSTRAR EL MODAL DE RENOVACIÓN ANTICIPADA
        const [showRenewModal, setShowRenewModal] = useState(false);
        const [saving, setSaving] = useState(false);

        const prevAptIds  = useRef(new Set()); const initialized = useRef(false);
        const allAptsRef  = useRef([]);

        useEffect(() => {
            if (user && !user.isAnonymous) {
                const t = setTimeout(() => requestNotificationPermission().catch(() => {}), 3000);
                return () => clearTimeout(t);
            }
        }, [user]);

        useEffect(() => {
            if (!user || user.isAnonymous) { setLoading(false); setProfile(null); return; }
            let active = true; let unsubApts = null;
            const unsubProf = db.collection("professionals").doc(user.uid).onSnapshot(
                (d) => { if (!active) return; if (d.exists) { setProfile(d.data()); setLogoPreview(d.data().logoBase64 || ''); } else setProfile(null); setLoading(false); },
                (err) => { console.warn('onSnapshot prof error:', err); if (!active) return; setLoading(false); }
            );
            const subscribeApts = () => {
                if (!active) return;
                unsubApts = db.collection("appointments").where("profId","==",user.uid).onSnapshot(
                    (snap) => {
                        if (!active) return;
                        const today = getTodayStr();
                        const now = new Date();
                        const nowMins = now.getHours() * 60 + now.getMinutes();
                        const isPast = (a) => {
                            if (a.date < today) return true;
                            if (a.date === today) {
                                const [h, m] = a.time.split(':').map(Number);
                                return (h * 60 + m) < nowMins;
                            }
                            return false;
                        };
                        const all = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        allAptsRef.current = all;
                        const newList = all.filter(a => !isPast(a)).sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
                        const pastList = all.filter(a => isPast(a)).sort((a,b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time));
                        setApts(newList); setPastApts(pastList);
                        if (initialized.current) {
                            let alertTriggered = false;
                            newList.forEach(apt => { if (!prevAptIds.current.has(apt.id)) { showNotification('Nuevo turno', `${apt.client} - ${apt.time}hs`); alertTriggered = true; }});
                            if (alertTriggered) playNotificationSound();
                        }
                        prevAptIds.current = new Set(newList.map(a => a.id)); initialized.current = true;
                    },
                    (err) => { console.warn('onSnapshot apts error:', err); }
                );
            };
            subscribeApts();
            // Recalcular próximos/pasados cada minuto sin esperar nuevo snapshot
            const minuteTimer = setInterval(() => {
                if (!active || allAptsRef.current.length === 0) return;
                const today = getTodayStr();
                const now = new Date();
                const nowMins = now.getHours() * 60 + now.getMinutes();
                const isPastNow = (a) => {
                    if (a.date < today) return true;
                    if (a.date === today) { const [h,m] = a.time.split(':').map(Number); return (h*60+m) < nowMins; }
                    return false;
                };
                const all = allAptsRef.current;
                setApts(all.filter(a => !isPastNow(a)).sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time)));
                setPastApts(all.filter(a => isPastNow(a)).sort((a,b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time)));
            }, 60000);
            return () => { active = false; clearInterval(minuteTimer); try { unsubProf(); } catch(e){} if (unsubApts) unsubApts(); };
        }, [user]);

        useEffect(() => {
            if (profile?.phone) {
                const guessPrefix = COUNTRY_CODES.find(c => profile.phone.startsWith(c.code))?.code || '54';
                setProfPhonePrefix(guessPrefix);
                setProfPhoneLocal(profile.phone.startsWith(guessPrefix) ? profile.phone.slice(guessPrefix.length) : profile.phone);
            }
        }, [profile]);

        if (!user || user.isAnonymous) return <AuthScreen setDialog={setDialog} setToast={setToast} />;
        if (loading) return <Spinner />;
        if (!profile) return <AuthScreen setDialog={setDialog} setToast={setToast} />;

        const daysLeft = getDaysLeft(profile.licenseExpiresAt);
        const isExpired = daysLeft <= 0;
        
        if (isExpired || profile.isSuspended) return <PaywallView userEmail={user.email} isSuspended={profile.isSuspended} />;

        const shareUrl = window.location.origin + window.location.pathname + "?p=" + user.uid;
        
        const handleLogoUpload = (e) => {
            const file = e.target.files[0]; if (!file) return;
            if (file.size > 200000) { setToast({type:'error', message:'La imagen es muy pesada. Elegí una menor a 200kb.'}); return; }
            const reader = new FileReader();
            reader.onloadend = () => { if (reader.result) setLogoPreview(reader.result); };
            reader.onerror = () => setToast({type:'error', message:'No se pudo leer la imagen. Intentá con otro archivo.'});
            reader.readAsDataURL(file);
        };

        const updateProfile = async (e) => {
            e.preventDefault(); const f = new FormData(e.target);
            const workingDays = DAYS.filter(d => f.get(`day_${d.id}`)).map(d => d.id);
            if (workingDays.length === 0) { setToast({ type:'error', message:'Seleccioná al menos un día de trabajo.' }); return; }
            const local = (f.get('phoneLocal') || '').replace(/\D/g,'');
            if (local.length < 8) { setToast({ type:'error', message:'Ingresá un WhatsApp válido.' }); return; }
            const startTime = f.get('startTime'); const endTime = f.get('endTime');
            if (startTime >= endTime) { setToast({ type:'error', message:'El horario de inicio debe ser menor al de fin.' }); return; }
            setSaving(true);
            try {
                await db.collection("professionals").doc(user.uid).update({
                    name: f.get('name'), business: f.get('business'), service: f.get('service'),
                    phone: f.get('phonePrefix')+local, waTemplate: f.get('waTemplate'),
                    themeColor: f.get('themeColor'), logoBase64: logoPreview,
                    config: {
                        workingDays,
                        startTime: f.get('startTime'), endTime: f.get('endTime'),
                        duration: Number(f.get('duration')), blockedDates: profile.config?.blockedDates || []
                    }
                });
                setToast({ type:'success', message:'¡Perfil actualizado correctamente!'});
            } catch(err) {
                setToast({ type:'error', message:'Error al guardar. Intentá de nuevo.' });
            } finally { setSaving(false); }
        };

        return (
            <div className="max-w-5xl mx-auto p-4 md:p-8 fade-in pb-20">
                {showRenewModal && <PaywallView userEmail={user.email} isSuspended={false} onClose={() => setShowRenewModal(false)} />}
                
                <header className="flex flex-col sm:flex-row sm:items-start justify-between gap-4 mb-8 pb-6 border-b border-neutral-200">
                    <div>
                        <span className="text-sm font-medium text-brand-600">Panel de Control</span>
                        <h1 className="text-3xl font-bold text-neutral-950 tracking-tighter">{profile.business}</h1>
                        <p className="text-neutral-600">Bienvenido, {profile.name}</p>
                        <div className="flex items-center gap-3 mt-2">
                            <div className={`inline-block px-3 py-1 rounded-lg text-xs font-bold border ${daysLeft <= 5 ? 'bg-red-100 text-red-700 border-red-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200'}`}>
                                Licencia activa: {daysLeft} días restantes
                            </div>
                            {/* BOTON DE RENOVACION ANTICIPADA */}
                            <button onClick={() => setShowRenewModal(true)} style={{background:'linear-gradient(135deg,#f59e0b,#ef4444)',animation:'renewPulse 2s ease-in-out infinite'}} className="mt-1 flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold text-white shadow-md transition-transform hover:scale-105 active:scale-95">
                                🔥 Renovar ahora
                            </button>
                        </div>
                    </div>
                    <div className="flex flex-col items-end gap-3">
                        <button onClick={() => auth.signOut()} className="text-neutral-400 hover:text-red-500 flex items-center gap-1.5 text-sm font-medium transition-colors"><IconLogout /> Cerrar Sesión</button>
                        <div className="bg-white p-4 rounded-3xl border border-neutral-100 shadow-sm w-full sm:min-w-[300px]">
                            <label className="block text-xs font-semibold text-neutral-500 uppercase mb-2">Tu link de reservas</label>
                            <div className="flex items-center gap-2 bg-neutral-50 border rounded-xl p-1 px-3">
                                <input type="text" readOnly value={shareUrl} className="flex-1 bg-transparent text-xs py-1.5 outline-none text-neutral-700 w-0" />
                                <button onClick={() => { navigator.clipboard.writeText(shareUrl).then(() => setToast({type:'success', message:'¡Link copiado!'})).catch(() => setToast({type:'error', message:'No se pudo copiar. Copialo manualmente.'})); }} className="text-brand-600 p-1.5 rounded-lg hover:bg-brand-50"><IconCopy /></button>
                            </div>
                        </div>
                    </div>
                </header>

                <div className="flex gap-2 mb-8 bg-white p-2 rounded-2xl border border-neutral-100 shadow-sm flex-wrap">
                    {[['appointments','Próximas Citas',<IconCalendar />],['history','Historial',<IconHistory />],['settings','Mi Perfil',<IconSettings />]].map(([tab,label,icon]) => (
                        <button key={tab} onClick={() => setActiveTab(tab)} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-medium text-sm transition-colors ${activeTab===tab ? 'bg-brand-50 text-brand-700' : 'text-neutral-500 hover:text-neutral-800'}`}>{icon} {label}</button>
                    ))}
                </div>

                {activeTab === 'history' && (
                    <div className="fade-in">
                        <h2 className="text-2xl font-semibold mb-6">Historial de Turnos</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {pastApts.length === 0 ? <p className="col-span-full p-10 bg-white rounded-3xl text-center text-neutral-500 shadow-sm border border-neutral-100">No hay turnos pasados.</p>
                            : pastApts.map(a => (
                                <div key={a.id} className="bg-white p-6 rounded-3xl shadow-sm border border-neutral-100 opacity-75">
                                    <div className="bg-neutral-100 text-neutral-600 font-bold px-3 py-1.5 rounded-xl text-sm border border-neutral-200 inline-block mb-3">{formatDate(a.date)} · {a.time} hs</div>
                                    <div className="font-bold text-neutral-950 uppercase text-lg">{a.client}</div>
                                    <div className="text-emerald-600 text-sm font-medium mt-1">{a.phone}</div>
                                    {a.notes && <p className="mt-3 text-xs text-neutral-500 bg-neutral-50 rounded-xl p-2.5 border border-neutral-100">{a.notes}</p>}
                                    <div className="flex gap-2 pt-4 mt-4 border-t border-neutral-100">
                                        <a href={`https://wa.me/${a.phone}?text=${encodeURIComponent(buildWAMsg(profile.waTemplate, a, profile.business))}`} target="_blank" className="flex-1 text-emerald-700 bg-emerald-50 border border-emerald-200 py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 active:scale-95 transition">
                                            <IconWhatsapp /> Contactar
                                        </a>
                                        <button onClick={async () => { try { await db.collection("appointments").doc(a.id).delete(); setToast({type:'success', message:'Turno eliminado'}); } catch(err) { setToast({type:'error', message:'No se pudo eliminar el turno.'}); } }} className="text-red-500 bg-red-50 border border-red-100 px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-1 active:scale-95 transition">
                                            <IconTrash />
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {activeTab === 'appointments' && (
                    <div className="fade-in">
                        <h2 className="text-2xl font-semibold mb-6">Turnos Programados</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {apts.length === 0 ? <p className="col-span-full p-10 bg-white rounded-3xl text-center text-neutral-500 shadow-sm border border-neutral-100">No hay turnos agendados.</p> 
                            : apts.map(a => (
                                <div key={a.id} className="bg-white p-6 rounded-3xl shadow-sm border border-neutral-100">
                                    <div className="bg-brand-50 text-brand-700 font-bold px-3 py-1.5 rounded-xl text-sm border border-brand-100 inline-block mb-3">{formatDate(a.date)} · {a.time} hs</div>
                                    <div className="font-bold text-neutral-950 uppercase text-lg">{a.client}</div>
                                    <div className="text-emerald-600 text-sm font-medium mt-1">{a.phone}</div>
                                    {a.notes && <p className="mt-3 text-xs text-neutral-500 bg-neutral-50 rounded-xl p-2.5 border border-neutral-100">{a.notes}</p>}
                                    <div className="flex gap-2 pt-4 mt-4 border-t border-neutral-100">
                                        <a href={`https://wa.me/${a.phone}?text=${encodeURIComponent(buildWAMsg(profile.waTemplate, a, profile.business))}`} target="_blank" className="flex-1 text-emerald-700 bg-emerald-50 border border-emerald-200 py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 active:scale-95 transition">
                                            <IconWhatsapp /> Contactar
                                        </a>
                                        <button onClick={async () => { try { await db.collection("appointments").doc(a.id).delete(); setToast({type:'success', message:'Turno eliminado'}); } catch(err) { setToast({type:'error', message:'No se pudo eliminar el turno.'}); } }} className="text-red-500 bg-red-50 border border-red-100 px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-1 active:scale-95 transition">
                                            <IconTrash />
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {activeTab === 'settings' && (
                    <div className="fade-in space-y-6">
                        <div className="bg-white p-8 rounded-4xl shadow-sm border border-neutral-100">
                            <h2 className="text-xl font-semibold mb-6 flex items-center gap-2"><IconSettings /> Personalización y Perfil</h2>
                            <form onSubmit={updateProfile} className="space-y-6">
                                <div className="p-5 bg-neutral-50 border border-neutral-200 rounded-3xl grid grid-cols-1 sm:grid-cols-2 gap-6 items-center">
                                    <div>
                                        <label className="block text-xs font-semibold text-neutral-500 uppercase mb-2">Color de tu marca</label>
                                        <div className="flex items-center gap-3">
                                            <input name="themeColor" type="color" defaultValue={profile.themeColor || '#4f46e5'} className="w-12 h-12 rounded cursor-pointer border-0 p-0" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-neutral-500 uppercase mb-2">Logo de la empresa</label>
                                        <div className="flex items-center gap-4">
                                            {logoPreview ? <img src={logoPreview} className="w-16 h-16 rounded-2xl object-cover border border-neutral-200 bg-white" /> 
                                                         : <div className="w-16 h-16 rounded-2xl border-2 border-dashed border-neutral-300 flex items-center justify-center text-neutral-400"><IconUpload/></div>}
                                            <label className="bg-white border border-neutral-200 px-4 py-2 rounded-xl text-sm font-medium cursor-pointer hover:bg-neutral-50 transition">
                                                Subir <input type="file" accept="image/*" className="hidden" onChange={handleLogoUpload} />
                                            </label>
                                            {logoPreview && <button type="button" onClick={()=>setLogoPreview('')} className="text-red-500 text-xs font-bold">Quitar</button>}
                                        </div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4 border-t border-neutral-100">
                                    <div><label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">Nombre</label><input name="name" defaultValue={profile.name} className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm outline-none" required /></div>
                                    <div><label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">Negocio</label><input name="business" defaultValue={profile.business} className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm outline-none" required /></div>
                                    <div><label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">Servicio</label><input name="service" defaultValue={profile.service} className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm outline-none" /></div>
                                    <div><label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">WhatsApp</label><PhoneInput namePrefix="phonePrefix" nameLocal="phoneLocal" prefix={profPhonePrefix} onPrefixChange={setProfPhonePrefix} value={profPhoneLocal} onChange={e => setProfPhoneLocal(e.target.value)} required /></div>
                                    <div className="sm:col-span-2 mt-2">
                                        <label className="block text-xs font-semibold text-neutral-500 uppercase mb-1.5">Mensaje Automático de WhatsApp</label>
                                        <textarea name="waTemplate" defaultValue={profile.waTemplate || DEFAULT_WA_TEMPLATE} rows="2" className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm outline-none focus:border-brand-600" placeholder="Ej: Hola {cliente}, te confirmo tu turno para el {fecha} a las {hora} en {negocio}."></textarea>
                                        <p className="text-[10px] text-neutral-400 mt-1">{'Variables automáticas permitidas: {cliente}, {fecha}, {hora}, {negocio}'}</p>
                                    </div>
                                </div>
                                <div><label className="block text-xs font-semibold text-neutral-500 uppercase mb-2">Días y Horarios</label>
                                    <div className="flex flex-wrap gap-2 mb-4">
                                        {DAYS.map(d => (<label key={d.id} className="flex items-center gap-1.5 bg-neutral-50 border border-neutral-200 px-3 py-2 rounded-xl cursor-pointer has-[:checked]:bg-brand-50 has-[:checked]:border-brand-300"><input name={`day_${d.id}`} type="checkbox" defaultChecked={(profile.config?.workingDays||[1,2,3,4,5]).includes(d.id)} className="accent-brand-600" /><span className="text-sm font-medium">{d.name}</span></label>))}
                                    </div>
                                    <div className="grid grid-cols-3 gap-4">
                                        <div><input name="startTime" type="time" defaultValue={profile.config?.startTime||'09:00'} className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm" /></div>
                                        <div><input name="endTime" type="time" defaultValue={profile.config?.endTime||'18:00'} className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm" /></div>
                                        <div><select name="duration" defaultValue={profile.config?.duration||30} className="w-full p-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm"><option value="15">15m</option><option value="30">30m</option><option value="60">1h</option></select></div>
                                    </div>
                                </div>
                                <button type="submit" disabled={saving} className={`px-8 py-4 rounded-2xl font-semibold shadow-lg text-white transition ${saving ? 'bg-brand-400 cursor-not-allowed' : 'bg-brand-600 active:scale-95'}`}>{saving ? 'Guardando...' : 'Guardar Cambios'}</button>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ===================== CLIENT =====================
    function ClientView({ profId, setDialog, setToast }) {
        const [prof, setProf]               = useState(null);
        const [sent, setSent]               = useState(null);
        const [selectedDate, setSelectedDate] = useState('');
        const [selectedTime, setSelectedTime] = useState('');
        const [bookedTimes, setBookedTimes] = useState([]);
        const [booking, setBooking]         = useState(false);
        const [clientView, setClientView]   = useState('book');
        const [phoneLocal, setPhoneLocal]   = useState('');
        const [phonePrefix, setPhonePrefix] = useState('54');
        const [profExpired, setProfExpired] = useState(false);
        const [loadingSlots, setLoadingSlots] = useState(false);

        useEffect(() => {
            db.collection("professionals").doc(profId).get().then(d => {
                if (d.exists) {
                    const data = d.data();
                    const daysLeft = getDaysLeft(data.licenseExpiresAt);
                    if (daysLeft <= 0 || data.isSuspended) { setProfExpired(true); return; }
                    if (!data.config) data.config = { workingDays:[1,2,3,4,5], startTime:'09:00', endTime:'18:00', duration:30, blockedDates:[] };
                    setProf(data);
                    if (data.themeColor) document.documentElement.style.setProperty('--custom-color', data.themeColor);
                    document.title = `Reservas - ${data.business}`;
                } else {
                    setProfExpired(true);
                }
            }).catch(() => setProfExpired(true));
        }, [profId]);

        useEffect(() => {
            if (selectedDate && profId) {
                setSelectedTime('');
                setBookedTimes([]);
                setLoadingSlots(true);
                db.collection("appointments").where("profId","==",profId).where("date","==",selectedDate).get()
                    .then(snap => { setBookedTimes(snap.docs.map(d => d.data().time)); setLoadingSlots(false); })
                    .catch(() => { setBookedTimes([]); setLoadingSlots(false); setToast({ type:'error', message:'No se pudieron cargar los horarios. Recargá la página.' }); });
            }
        }, [selectedDate, profId]);

        const handleBooking = async (e) => {
            e.preventDefault(); if (!selectedTime) return;
            if (phoneLocal.replace(/\D/g,'').length < 8) { setToast({ type:'error', message:'Ingresá un número de WhatsApp válido.' }); return; }
            setBooking(true);
            try { 
                let currentUid = auth.currentUser?.uid;
                if (!currentUid) {
                    const cred = await auth.signInAnonymously();
                    currentUid = cred.user.uid;
                }
                
                const slotId  = `${profId}_${selectedDate}_${selectedTime.replace(':','-')}`;
                const slotRef = db.collection("appointments").doc(slotId);
                const aptData = {
                    profId, date: selectedDate, time: selectedTime,
                    client: e.target.clientName.value,
                    phone: buildPhone(phonePrefix, phoneLocal),
                    notes: e.target.notes?.value || '',
                    clientUid: currentUid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                // Transacción atómica: falla si otro usuario reservó el slot al mismo tiempo
                await db.runTransaction(async (tx) => {
                    const slotDoc = await tx.get(slotRef);
                    if (slotDoc.exists) throw new Error("Ese horario ya fue reservado por otra persona.");
                    tx.set(slotRef, aptData);
                });
                
                setSent({ date: selectedDate, time: selectedTime, client: e.target.clientName.value });
            } catch (err) { 
                console.error(err); 
                const errorMsg = err.code === 'permission-denied' ? 'Error de permisos de Firebase.' : err.message;
                setToast({ type:'error', message: errorMsg }); 
            } finally { setBooking(false); }
        };

        if (profExpired) return (
            <div className="h-screen flex items-center justify-center p-6 bg-brand-50 text-center fade-in">
                <div className="bg-white p-8 rounded-4xl shadow-xl max-w-sm w-full border border-neutral-100">
                    <span className="text-5xl block mb-4">&#9888;&#65039;</span>
                    <h2 className="text-xl font-bold mb-2">Servicio no disponible</h2>
                    <p className="text-neutral-500 text-sm">El sistema de reservas de este negocio se encuentra temporalmente inactivo.</p>
                </div>
            </div>
        );

        if (sent) return (
            <div className="h-screen flex items-center justify-center p-6 bg-brand-50 text-center fade-in">
                <div className="bg-white p-10 rounded-4xl shadow-xl max-w-sm border border-neutral-100 w-full">
                    <div className="w-20 h-20 custom-bg rounded-full flex items-center justify-center mx-auto mb-6 text-5xl border border-white">&#10003;</div>
                    <h2 className="text-2xl font-bold tracking-tight">¡Turno Confirmado!</h2>
                    <div className="mt-4 bg-neutral-50 rounded-2xl p-4 border custom-border">
                        <p className="custom-text font-semibold text-lg">{formatDate(sent.date)}</p>
                        <p className="custom-text font-bold text-2xl">{sent.time} hs</p>
                    </div>
                    <button onClick={() => { setSent(null); setSelectedDate(''); setClientView('cancel'); }} className="mt-6 w-full custom-text border custom-border py-3 rounded-2xl text-sm font-medium transition">Ver mis turnos</button>
                </div>
            </div>
        );

        if (!prof) return <Spinner />;

        const today = getTodayStr(); let availableSlots = [];
        let isDayUnavailable = false;
        if (selectedDate) {
            const isWork = prof.config.workingDays.includes(parseDateLocal(selectedDate).getDay()) && !(prof.config.blockedDates||[]).includes(selectedDate);
            if (isWork) availableSlots = generateTimeSlots(prof.config.startTime, prof.config.endTime, prof.config.duration).filter(t => !bookedTimes.includes(t));
            else isDayUnavailable = true;
            if (selectedDate === today) { const nowMins = new Date().getHours()*60 + new Date().getMinutes(); availableSlots = availableSlots.filter(t => (Number(t.split(':')[0])*60+Number(t.split(':')[1])) > nowMins); }
        }

        return (
            <div className="max-w-md mx-auto p-6 pb-12 fade-in">
                <div className="text-center mb-8 mt-6">
                    {prof.logoBase64 ? <img src={prof.logoBase64} className="w-24 h-24 rounded-4xl mx-auto mb-5 object-cover shadow-xl border-4 border-white" />
                                     : <div className="w-24 h-24 custom-bg rounded-4xl mx-auto flex items-center justify-center text-5xl font-bold mb-5 shadow-xl border-4 border-white">{prof.business.charAt(0).toUpperCase()}</div>}
                    <h1 className="text-2xl font-bold text-neutral-950 tracking-tighter">{prof.business}</h1>
                    <p className="custom-text font-medium">{prof.service || 'Reserva tu cita online'}</p>
                </div>

                <div className="flex gap-2 mb-6 bg-white p-1.5 rounded-2xl border border-neutral-100 shadow-sm">
                    <button onClick={() => setClientView('book')} className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-colors ${clientView==='book' ? 'custom-bg shadow-md' : 'text-neutral-500'}`}>&#128197; Reservar</button>
                    <button onClick={() => setClientView('cancel')} className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-colors ${clientView==='cancel' ? 'custom-bg shadow-md' : 'text-neutral-500'}`}>Mis turnos</button>
                </div>

                {clientView === 'book' ? (
                    <form onSubmit={handleBooking} className="bg-white p-6 sm:p-8 rounded-4xl shadow-xl shadow-brand-100/50 space-y-6 border border-neutral-100">
                        <input type="date" min={today} value={selectedDate} onChange={e => { if (e.target.value) setSelectedDate(e.target.value); }} className="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none text-sm font-medium" required />
                        {selectedDate && (
                            isDayUnavailable ? (
                                <div className="text-center py-5 text-sm text-neutral-500 bg-neutral-50 rounded-2xl border border-neutral-200 fade-in">&#128683; Este día no está disponible.</div>
                            ) : loadingSlots ? (
                                <div className="text-center py-5 text-sm text-neutral-400 bg-neutral-50 rounded-2xl border border-neutral-200 fade-in flex items-center justify-center gap-2">
                                    <div className="w-4 h-4 border-2 border-neutral-400 border-t-transparent rounded-full animate-spin"></div> Cargando horarios...
                                </div>
                            ) : availableSlots.length === 0 ? (
                                <div className="text-center py-5 text-sm text-neutral-500 bg-neutral-50 rounded-2xl border border-neutral-200 fade-in">&#128549; No quedan turnos disponibles para este día.</div>
                            ) : (
                                <div className="grid grid-cols-3 gap-2 max-h-48 overflow-y-auto p-1 fade-in">
                                    {availableSlots.map(time => (
                                        <button type="button" key={time} onClick={() => setSelectedTime(time)} className={`py-2 rounded-xl text-sm font-semibold transition-all ${selectedTime===time ? 'custom-bg shadow-md' : 'bg-neutral-50 text-neutral-700 border border-neutral-200'}`}>{time}</button>
                                    ))}
                                </div>
                            )
                        )}
                        <div className={`border-t border-neutral-100 pt-6 space-y-4 transition-all ${!selectedTime ? 'opacity-50 pointer-events-none' : ''}`}>
                            <input name="clientName" placeholder="Nombre y apellido" className="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none mb-4" required />
                            <PhoneInput namePrefix="phonePrefix" nameLocal="phoneLocal" prefix={phonePrefix} onPrefixChange={setPhonePrefix} value={phoneLocal} onChange={e => setPhoneLocal(e.target.value.replace(/\D/g,''))} placeholder="Sin 0 ni 15" required />
                            <input name="notes" placeholder="Alguna nota o comentario (opcional)" className="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none" />
                            <button type="submit" disabled={booking} className={`w-full custom-bg p-5 rounded-2xl font-semibold shadow-lg mt-2 transition text-lg ${booking ? 'opacity-70' : 'active:scale-[0.98]'}`}>
                                {booking ? 'Reservando...' : 'Confirmar Reserva'}
                            </button>
                        </div>
                    </form>
                ) : (
                    <CancelView profId={profId} profPhone={prof.phone} setDialog={setDialog} setToast={setToast} onReschedule={() => { setClientView('book'); setSelectedDate(''); setSelectedTime(''); }} />
                )}
            </div>
        );
    }

    // ===================== CANCEL VIEW =====================
    function CancelView({ profId, profPhone, setDialog, setToast, onReschedule }) {
        const [searchPrefix, setSearchPrefix] = useState('54');
        const [searchLocal,  setSearchLocal]  = useState('');
        const [myApts, setMyApts]   = useState(null);
        const [searching, setSearching] = useState(false);

        const searchApts = async () => {
            const localClean = searchLocal.replace(/\D/g,'');
            if (localClean.length < 8) { setToast({ type:'error', message:'Ingresá un número válido' }); return; }
            setSearching(true);
            try {
                const today    = getTodayStr();
                const fullPhone = buildPhone(searchPrefix, localClean);
                const snap = await db.collection("appointments").where("profId","==",profId).get();
                const now = new Date();
                const nowMins = now.getHours() * 60 + now.getMinutes();
                const isFuture = (a) => {
                    if (a.date > today) return true;
                    if (a.date === today) { const [h,m] = a.time.split(':').map(Number); return (h*60+m) > nowMins; }
                    return false;
                };
                const list = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .filter(a => (a.phone === fullPhone || a.phone === localClean) && isFuture(a))
                    .sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
                setMyApts(list);
            } catch (err) { setToast({ type:'error', message:'Error al buscar turnos.' }); } finally { setSearching(false); }
        };

        const cancelApt = (apt) => {
            setDialog({
                type:'confirm', title:'Cancelar Turno', message:`¿Querés cancelar el turno del ${formatDate(apt.date)} a las ${apt.time}hs?`,
                onConfirm: async () => {
                    try {
                        await db.collection("appointments").doc(apt.id).delete();
                        setMyApts(prev => prev.filter(a => a.id !== apt.id));
                        setToast({type:'success', message:'Turno cancelado'});
                    } catch (err) { setToast({ type:'error', message:'No se pudo cancelar.' }); }
                }
            });
        };

        const rescheduleApt = (apt) => {
            setDialog({
                type:'confirm', title:'Reprogramar Turno', message:`Cancelamos el turno del ${formatDate(apt.date)} a las ${apt.time}hs para elegir uno nuevo. ¿Continuás?`,
                onConfirm: async () => {
                    try {
                        await db.collection("appointments").doc(apt.id).delete();
                        setToast({ type:'success', message:'Turno cancelado. Elegí una nueva fecha.' });
                        if (onReschedule) onReschedule();
                    } catch (err) { setToast({ type:'error', message:'No se pudo reprogramar. Intentá de nuevo.' }); }
                }
            });
        };

        return (
            <div className="bg-white p-6 sm:p-8 rounded-4xl shadow-xl shadow-brand-100/50 space-y-6 border border-neutral-100 fade-in">
                <div><h3 className="text-lg font-bold mb-1">Mis turnos</h3><p className="text-sm text-neutral-500">Ingresá el WhatsApp con el que reservaste para ver tus turnos.</p></div>
                <div className="space-y-2">
                    <PhoneInput namePrefix="searchPrefix" nameLocal="searchLocal" prefix={searchPrefix} onPrefixChange={setSearchPrefix} value={searchLocal} onChange={e => setSearchLocal(e.target.value)} placeholder="1122334455" />
                    <button onClick={searchApts} disabled={searching} className="w-full bg-brand-600 text-white py-3 rounded-2xl font-semibold active:scale-95 transition flex items-center justify-center gap-2 text-sm">
                        {searching ? 'Buscando...' : <><IconSearch /> Buscar mis turnos</>}
                    </button>
                </div>
                {myApts !== null && (
                    <div className="fade-in">
                        {myApts.length === 0 ? (
                            <div className="text-center py-8 text-neutral-500 text-sm bg-neutral-50 rounded-2xl border border-neutral-100"><span className="text-3xl block mb-2">&#128269;</span>No encontramos turnos futuros.</div>
                        ) : (
                            <div className="space-y-3">
                                {myApts.map(apt => (
                                    <div key={apt.id} className="bg-neutral-50 border border-neutral-200 rounded-2xl p-4 space-y-3 fade-in">
                                        <div>
                                            <div className="bg-brand-50 text-brand-700 font-bold px-3 py-1 rounded-xl text-sm border border-brand-100 inline-block mb-1">{formatDate(apt.date)} · {apt.time} hs</div>
                                            <div className="font-semibold text-neutral-800">{apt.client}</div>
                                        </div>
                                        <div className="flex gap-2 pt-1 border-t border-neutral-200">
                                            <button onClick={() => rescheduleApt(apt)} className="flex-1 text-brand-600 bg-brand-50 border border-brand-100 py-2 rounded-xl text-xs font-semibold flex items-center justify-center gap-1 active:scale-95 transition">&#128197; Reprogramar</button>
                                            <button onClick={() => cancelApt(apt)} className="text-red-500 bg-red-50 border border-red-100 px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-1 active:scale-95 transition"><IconTrash /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
