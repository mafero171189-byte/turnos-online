        const IconWhatsapp = () => <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>;
        const IconNote = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>;
        const IconBlock = () => <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>;

        // Utilidad: Generar horarios
        const generateTimeSlots = (start, end, durationMins) => {
            const slots = [];
            let [startHr, startMin] = start.split(':').map(Number);
            const [endHr, endMin] = end.split(':').map(Number);
            let currentMinutes = startHr * 60 + startMin;
            const endMinutes = endHr * 60 + endMin;
            while (currentMinutes + durationMins <= endMinutes) {
                const h = Math.floor(currentMinutes / 60).toString().padStart(2, '0');
                const m = (currentMinutes % 60).toString().padStart(2, '0');
                slots.push(`${h}:${m}`);
                currentMinutes += durationMins;
            }
            return slots;
        };

        // FIX: Parseo de fecha robusto — evita desfasaje de zona horaria
        const parseDateLocal = (dateStr) => {
            const [y, m, d] = dateStr.split('-').map(Number);
            return new Date(y, m - 1, d);
        };

        // Formatear fecha para mostrar
        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            return dateStr.split('-').reverse().join('/');
        };

        const DAYS = [
            { id: 1, name: 'Lun' }, { id: 2, name: 'Mar' }, { id: 3, name: 'Mié' },
            { id: 4, name: 'Jue' }, { id: 5, name: 'Vie' }, { id: 6, name: 'Sáb' }, { id: 0, name: 'Dom' }
        ];

        // Fecha de hoy en formato YYYY-MM-DD (local, sin desfasaje UTC)
        const getTodayStr = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('loading'); 
            const [profId, setProfId] = useState(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const p = params.get('p');
                
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (p) {
                        setProfId(p);
                        setView('client');
                        if (!u) auth.signInAnonymously().catch(console.error);
                    } else {
                        setView('admin');
                    }
                });
                return () => unsubscribe();
            }, []);

            if (view === 'loading') return <div class="flex h-screen items-center justify-center bg-brand-50"><div class="w-10 h-10 border-4 border-brand-600 border-t-transparent rounded-full animate-spin"></div></div>;

            return view === 'client' ? <ClientView profId={profId} /> : <AdminView user={user} />;
        }

        // --- PANTALLA DE LOGIN / REGISTRO ---
        function AuthScreen() {
            const [isLogin, setIsLogin] = useState(true);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                const email = e.target.email.value;
                const password = e.target.password.value;

                try {
                    if (isLogin) {
                        await auth.signInWithEmailAndPassword(email, password);
                    } else {
                        const name = e.target.name.value;
                        const business = e.target.business.value;
                        const service = e.target.service.value;
                        const phone = e.target.phone.value;

                        // FIX: Validar teléfono al registrarse
                        const phoneClean = phone.replace(/\D/g, '');
                        if (phoneClean.length < 8 || phoneClean.length > 15) {
                            setError('El teléfono debe tener entre 8 y 15 dígitos.');
                            setLoading(false);
                            return;
                        }
                        
                        const res = await auth.createUserWithEmailAndPassword(email, password);
                        
                        await db.collection("professionals").doc(res.user.uid).set({
                            name, business, service, phone: phoneClean, email,
                            config: {
                                workingDays: [1, 2, 3, 4, 5],
                                startTime: '09:00',
                                endTime: '18:00',
                                duration: 30,
                                blockedDates: []  // FIX: soporte para fechas bloqueadas
                            }
                        });
                    }
                } catch (err) {
                    setError('Error: Verifica tus datos o intenta de nuevo.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div class="min-h-screen flex items-center justify-center p-4 fade-in">
                    <div class="w-full max-w-md">
                        <div class="text-center mb-10">
                            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-4xl shadow-xl shadow-brand-100 mb-4 border border-brand-100">
                                <span class="text-4xl">📅</span>
                            </div>
                            <h1 class="text-3xl font-bold text-neutral-950 tracking-tighter">Turno Fácil<span class="text-brand-600">Pro</span></h1>
                        </div>

                        <div class="bg-white p-8 rounded-4xl shadow-2xl shadow-brand-100/50 border border-neutral-100">
                            <h2 class="text-xl font-semibold text-neutral-900 mb-1">{isLogin ? '¡Hola de nuevo!' : 'Crea tu cuenta'}</h2>
                            <p class="text-neutral-500 mb-8 text-sm">{isLogin ? 'Ingresa para ver tus turnos.' : 'Configura tu panel profesional.'}</p>
                            
                            {error && <div class="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-6 border border-red-100">{error}</div>}

                            <form onSubmit={handleSubmit} class="space-y-4">
                                {!isLogin && (
                                    <>
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconUser /></div>
                                            <input name="name" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100 text-sm" placeholder="Tu nombre" required />
                                        </div>
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconBriefcase /></div>
                                            <input name="business" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100 text-sm" placeholder="Nombre de tu negocio" required />
                                        </div>
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconSettings /></div>
                                            <input name="service" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100 text-sm" placeholder="¿A qué te dedicás? (Ej: Servicio Técnico)" required />
                                        </div>
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconPhone /></div>
                                            <input name="phone" type="tel" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100 text-sm" placeholder="WhatsApp (Ej: 1122334455)" required />
                                        </div>
                                    </>
                                )}
                                
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconMail /></div>
                                    <input name="email" type="email" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100 text-sm" placeholder="Correo electrónico" required />
                                </div>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400"><IconLock /></div>
                                    <input name="password" type="password" class="w-full pl-12 pr-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100 text-sm" placeholder="Contraseña (Mín. 6 caracteres)" required />
                                </div>

                                <button disabled={loading} class="w-full bg-brand-600 hover:bg-brand-700 text-white p-4 rounded-2xl font-semibold transition duration-150 shadow-lg shadow-brand-200 mt-2">
                                    {loading ? 'Cargando...' : (isLogin ? 'Ingresar a mi panel' : 'Crear mi cuenta')}
                                </button>
                            </form>
                            
                            <div class="mt-6 text-center">
                                <button onClick={() => {setIsLogin(!isLogin); setError('');}} class="text-brand-600 hover:text-brand-800 text-sm font-medium">
                                    {isLogin ? '¿No tienes cuenta? Regístrate aquí' : '¿Ya tienes cuenta? Inicia sesión'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- VISTA DEL DUEÑO (ADMIN PANEL) ---
        function AdminView({ user }) {
            if (!user || user.isAnonymous) return <AuthScreen />;

            const [profile, setProfile] = useState(null);
            const [apts, setApts] = useState([]);
            const [pastApts, setPastApts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('appointments');
            // FIX: Estado para gestionar fechas bloqueadas en settings
            const [newBlockDate, setNewBlockDate] = useState('');

            useEffect(() => {
                // ✅ Con manejo de error para no quedar cargando infinito
                const unsubProf = db.collection("professionals").doc(user.uid).onSnapshot(
                    (d) => {
                        setProfile(d.exists ? d.data() : null);
                        setLoading(false);
                    },
                    (err) => {
                        console.error("Error cargando perfil:", err);
                        setLoading(false);
                    }
                );

                const today = getTodayStr();

                const unsubApts = db.collection("appointments")
                    .where("profId", "==", user.uid)
                    .where("date", ">=", today)
                    .orderBy("date", "asc")
                    .onSnapshot(
                        (snap) => { setApts(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
                        (err) => { console.error("Error turnos futuros:", err); setApts([]); }
                    );

                const unsubPast = db.collection("appointments")
                    .where("profId", "==", user.uid)
                    .where("date", "<", today)
                    .orderBy("date", "desc")
                    .onSnapshot(
                        (snap) => { setPastApts(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))); },
                        (err) => { console.error("Error historial:", err); setPastApts([]); }
                    );

                return () => { unsubProf(); unsubApts(); unsubPast(); };
            }, [user]);

            if (loading) return <div class="flex h-screen items-center justify-center bg-brand-50"><div class="w-10 h-10 border-4 border-brand-600 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!profile) return (
                <div class="flex h-screen items-center justify-center bg-brand-50 p-6">
                    <div class="bg-white p-10 rounded-4xl shadow-xl text-center max-w-sm border border-neutral-100">
                        <span class="text-5xl block mb-4">⚠️</span>
                        <h2 class="text-xl font-bold text-neutral-900 mb-2">No se encontró tu perfil</h2>
                        <p class="text-neutral-500 text-sm mb-6">Puede que tu cuenta no esté configurada. Cerrá sesión e intentá de nuevo.</p>
                        <button onClick={() => auth.signOut()} class="bg-brand-600 text-white px-6 py-3 rounded-2xl font-semibold text-sm">Cerrar Sesión</button>
                    </div>
                </div>
            );

            const shareUrl = window.location.origin + window.location.pathname + "?p=" + user.uid;

            // FIX: Botón de confirmar por WhatsApp
            const sendWhatsAppConfirm = (a) => {
                const phone = a.phone.replace(/\D/g, '');
                const msg = encodeURIComponent(
                    `¡Hola ${a.client}! Te confirmamos tu turno para el ${formatDate(a.date)} a las ${a.time}hs en ${profile.business}. ¡Te esperamos! 😊`
                );
                window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
            };

            const updateProfile = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const workingDays = DAYS.filter(d => formData.get(`day_${d.id}`)).map(d => d.id);

                // FIX: Validar teléfono al actualizar perfil
                const phoneRaw = formData.get('phone');
                const phoneClean = phoneRaw.replace(/\D/g, '');
                if (phoneClean.length < 8 || phoneClean.length > 15) {
                    alert('El teléfono debe tener entre 8 y 15 dígitos.');
                    return;
                }
                
                await db.collection("professionals").doc(user.uid).update({
                    name: formData.get('name'),
                    business: formData.get('business'),
                    service: formData.get('service'),
                    phone: phoneClean,
                    config: {
                        workingDays: workingDays.length > 0 ? workingDays : profile.config?.workingDays,
                        startTime: formData.get('startTime'),
                        endTime: formData.get('endTime'),
                        duration: Number(formData.get('duration')),
                        blockedDates: profile.config?.blockedDates || []
                    }
                });
                alert("¡Perfil y horarios actualizados!");
            };

            // FIX: Agregar fecha bloqueada
            const addBlockedDate = async () => {
                if (!newBlockDate) return;
                const current = profile.config?.blockedDates || [];
                if (current.includes(newBlockDate)) {
                    alert('Esa fecha ya está bloqueada.');
                    return;
                }
                const updated = [...current, newBlockDate].sort();
                await db.collection("professionals").doc(user.uid).update({
                    'config.blockedDates': updated
                });
                setNewBlockDate('');
            };

            // FIX: Quitar fecha bloqueada
            const removeBlockedDate = async (date) => {
                const updated = (profile.config?.blockedDates || []).filter(d => d !== date);
                await db.collection("professionals").doc(user.uid).update({
                    'config.blockedDates': updated
                });
            };

            return (
                <div class="max-w-5xl mx-auto p-4 md:p-8 fade-in pb-20">
                    <header class="flex flex-col sm:flex-row sm:items-start justify-between gap-4 mb-8 pb-6 border-b border-neutral-200">
                        <div>

        // --- VISTA DEL CLIENTE (CORREGIDA) ---
        function ClientView({ profId }) {
            const [prof, setProf] = useState(null);
            // FIX: sent ahora guarda {date, time} para mostrar en la confirmación
            const [sent, setSent] = useState(null);
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedTime, setSelectedTime] = useState('');
            const [bookedTimes, setBookedTimes] = useState([]);
            // FIX: Estado de carga para prevenir doble clic
            const [booking, setBooking] = useState(false);

            useEffect(() => {
                db.collection("professionals").doc(profId).get().then(d => {
                    if (d.exists) {
                        const data = d.data();
                        if (!data.config) data.config = { workingDays: [1,2,3,4,5], startTime: '09:00', endTime: '18:00', duration: 30, blockedDates: [] };
                        if (!data.config.blockedDates) data.config.blockedDates = [];
                        setProf(data);
                        // FIX: Title dinámico
                        document.title = `Reservas – ${data.business}`;
                    }
                });
            }, [profId]);

            useEffect(() => {
                if (selectedDate && profId) {
                    db.collection("appointments")
                      .where("profId", "==", profId)
                      .where("date", "==", selectedDate)
                      .get()
                      .then(snap => {
                          setBookedTimes(snap.docs.map(d => d.data().time));
                      });
                    setSelectedTime('');
                }
            }, [selectedDate, profId]);

            const handleBooking = async (e) => {
                e.preventDefault();
                if (!selectedTime) return alert("Por favor, selecciona una hora.");
                // FIX: Prevenir doble clic
                if (booking) return;

                // FIX: Validar teléfono del cliente
                const phoneRaw = e.target.phone.value;
                const phoneClean = phoneRaw.replace(/\D/g, '');
                if (phoneClean.length < 8 || phoneClean.length > 15) {
                    alert('Ingresá un número de WhatsApp válido (solo dígitos, entre 8 y 15).');
                    return;
                }

                setBooking(true);

                // ID determinístico para poder hacer la transacción atómica
                const slotId = `${profId}_${selectedDate}_${selectedTime.replace(':', '-')}`;
                const slotRef = db.collection("appointments").doc(slotId);

                try {
                    await db.runTransaction(async (tx) => {
                        const slotDoc = await tx.get(slotRef);
                        if (slotDoc.exists) {
                            throw new Error("SLOT_TAKEN");
                        }
                        tx.set(slotRef, {
                            profId,
                            date: selectedDate,
                            time: selectedTime,
                            client: e.target.clientName.value,
                            phone: phoneClean,
                            notes: e.target.notes.value.trim() || '',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    });

                    // FIX: Pasar fecha y hora a la pantalla de confirmación
                    setSent({ date: selectedDate, time: selectedTime });

                } catch (err) {
                    if (err.message === "SLOT_TAKEN") {
                        alert("¡Ese turno acaba de ser tomado por otra persona! Por favor elegí otro horario.");
                        // Refrescar horarios ocupados
                        const snap = await db.collection("appointments")
                            .where("profId", "==", profId)
                            .where("date", "==", selectedDate)
                            .get();
                        setBookedTimes(snap.docs.map(d => d.data().time));
                        setSelectedTime('');
                    } else {
                        alert("Ocurrió un error al reservar. Intentá de nuevo.");
                        console.error(err);
                    }
                } finally {
                    setBooking(false);
                }
            };

            // FIX: Pantalla de confirmación con detalles del turno
            if (sent) return (
                <div class="h-screen flex items-center justify-center p-6 bg-brand-50 text-center fade-in">
                    <div class="bg-white p-10 rounded-4xl shadow-xl max-w-sm border border-neutral-100 w-full">
                        <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl border border-emerald-100">✓</div>
                        <h2 class="text-2xl font-bold text-neutral-950 tracking-tight">¡Turno Confirmado!</h2>
                        <div class="mt-4 bg-brand-50 rounded-2xl p-4 border border-brand-100">
                            <p class="text-brand-700 font-semibold text-lg">{formatDate(sent.date)}</p>
                            <p class="text-brand-600 font-bold text-2xl">{sent.time} hs</p>
                        </div>
                        <p class="text-neutral-500 mt-4 text-sm">Tu reserva en <span class="font-semibold text-neutral-700">{prof?.business}</span> fue registrada correctamente.</p>
                    </div>
                </div>
            );

            if (!prof) return <div class="p-10 text-center bg-brand-50 h-screen text-neutral-500 flex items-center justify-center">Cargando datos del negocio...</div>;

            // Lógica para mostrar horarios disponibles
            let availableSlots = [];
            let isWorkingDay = true;
            let isBlockedDate = false;

            if (selectedDate) {
                // FIX: Parseo de fecha robusto (evita problema de zona horaria)
                const dateObj = parseDateLocal(selectedDate);
                const dayOfWeek = dateObj.getDay();
                isWorkingDay = prof.config.workingDays.includes(dayOfWeek);

                // FIX: Verificar si la fecha está bloqueada
                isBlockedDate = (prof.config.blockedDates || []).includes(selectedDate);
                
                if (isWorkingDay && !isBlockedDate) {
                    const allSlots = generateTimeSlots(prof.config.startTime, prof.config.endTime, prof.config.duration);
                    availableSlots = allSlots.filter(t => !bookedTimes.includes(t));
                }
            }

            const today = getTodayStr();

            return (
                <div class="max-w-md mx-auto p-6 pb-12 fade-in">
                    <div class="text-center mb-10 mt-6">
                        <div class="w-24 h-24 bg-brand-600 text-white rounded-4xl mx-auto flex items-center justify-center text-5xl font-bold mb-5 shadow-xl shadow-brand-100 border-4 border-white">
                            {prof.business.charAt(0).toUpperCase()}
                        </div>
                        <h1 class="text-2xl font-bold text-neutral-950 tracking-tighter">{prof.business}</h1>
                        <p class="text-brand-600 font-medium">{prof.service || 'Reserva tu cita online'}</p>
                    </div>

                    <form onSubmit={handleBooking} class="bg-white p-6 sm:p-8 rounded-4xl shadow-xl shadow-brand-100/50 space-y-6 border border-neutral-100">
                        
                        {/* Selector de Fecha */}
                        <div>
                            <label class="block text-xs font-bold text-neutral-500 uppercase mb-2 ml-1">Selecciona el día</label>
                            <input type="date" min={today} value={selectedDate} onChange={e => setSelectedDate(e.target.value)} class="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100 text-sm font-medium" required />
                        </div>

                        {/* Selector de Hora Dinámico */}
                        {selectedDate && (
                            <div class="fade-in">
                                <label class="block text-xs font-bold text-neutral-500 uppercase mb-2 ml-1">Horarios Disponibles</label>
                                {isBlockedDate ? (
                                    <div class="p-4 bg-red-50 text-red-600 rounded-2xl text-sm border border-red-100 text-center">
                                        El profesional no atiende esta fecha (feriado o vacaciones).
                                    </div>
                                ) : !isWorkingDay ? (
                                    <div class="p-4 bg-red-50 text-red-600 rounded-2xl text-sm border border-red-100 text-center">
                                        El profesional no atiende este día.
                                    </div>
                                ) : availableSlots.length === 0 ? (
                                    <div class="p-4 bg-orange-50 text-orange-600 rounded-2xl text-sm border border-orange-100 text-center">
                                        No hay turnos libres para esta fecha.
                                    </div>
                                ) : (
                                    <div class="grid grid-cols-3 gap-2 max-h-48 overflow-y-auto p-1">
                                        {availableSlots.map(time => (
                                            <button type="button" key={time} onClick={() => setSelectedTime(time)} class={`py-2 rounded-xl text-sm font-semibold transition-all ${selectedTime === time ? 'bg-brand-600 text-white shadow-md' : 'bg-neutral-50 text-neutral-700 hover:bg-brand-100 border border-neutral-200'}`}>
                                                {time}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {/* Datos del Cliente */}
                        <div class={`border-t border-neutral-100 pt-6 space-y-4 transition-all ${!selectedTime ? 'opacity-50 pointer-events-none' : ''}`}>
                            <div>
                                <label class="block text-xs font-bold text-neutral-500 uppercase mb-1.5 ml-1">Tus Datos</label>
                                {/* FIX: name cambiado a clientName para evitar conflicto con form.name */}
                                <input name="clientName" placeholder="Nombre y apellido" class="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100 mb-4" required />
                                <input name="phone" type="tel" placeholder="Tu WhatsApp (Ej: 1122334455)" class="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100" required />
                            </div>
                            {/* FIX: Campo de notas opcionales */}
                            <div>
                                <label class="block text-xs font-bold text-neutral-500 uppercase mb-1.5 ml-1">Motivo de la consulta <span class="normal-case font-normal text-neutral-400">(opcional)</span></label>
                                <textarea name="notes" placeholder="Ej: consulta de rutina, revisión técnica, etc." rows="2" class="w-full p-4 bg-neutral-50 border border-neutral-200 rounded-2xl outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-100 text-sm resize-none"></textarea>
                            </div>
                            {/* FIX: Botón con estado de carga y prevención de doble clic */}
                            <button
                                type="submit"
                                disabled={booking}
                                class={`w-full text-white p-5 rounded-2xl font-semibold shadow-lg shadow-brand-200 mt-2 transition duration-150 text-lg ${booking ? 'bg-brand-400 cursor-not-allowed' : 'bg-brand-600 active:scale-[0.98]'}`}
                            >
                                {booking ? 'Reservando...' : 'Confirmar Reserva'}
                            </button>
                        </div>

                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
